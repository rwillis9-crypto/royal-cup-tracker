<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Cup — Sales Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2EDE3;--surf:#FFFFFF;--surf2:#F8F5EE;--surf3:#EDE5D8;
  --text:#1B2A4A;--text2:#5C5246;--text3:#9B8F82;
  --bdr:#DDD5C6;--bdr2:#C4B89E;
  --navy:#1B2A4A;--gold:#C9A84C;--gold-s:#F5E6B8;--gold-t:#7A5E10;
  --r:8px;--rl:12px;--rxl:16px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --grn:#1A7A52;--grn-s:#E0F3EA;--grn-t:#0D4A2F;
  --amb:#C9A84C;--amb-s:#FBF4E0;--amb-t:#7A5E10;
  --red:#B83030;--red-s:#FAE8E8;--red-t:#741C1C;
  --grys:#EDE5D8;--gryt:#3D2E1E;
  --tel-s:#D6F0E8;--tel-t:#0D4A2F;
  --shd:0 1px 3px rgba(27,42,74,.08),0 1px 2px rgba(27,42,74,.04);
  --shd-md:0 4px 14px rgba(27,42,74,.12),0 2px 4px rgba(27,42,74,.06);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
body::before{content:'';display:block;height:4px;background:linear-gradient(90deg,#1B2A4A 0%,#C9A84C 50%,#1B2A4A 100%);position:sticky;top:0;z-index:999}
.app{max-width:1460px;margin:0 auto;padding:14px 18px}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--navy)}
.hdr .sv{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.hdr-r{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{height:32px;padding:0 13px;font-size:13px;font-weight:500;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);cursor:pointer;font-family:var(--font);white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .15s,border-color .15s}
.btn:hover{background:var(--surf2);border-color:var(--bdr2)}
.btn.pri{background:var(--navy);color:#fff;border-color:var(--navy)}.btn.pri:hover{opacity:.87}
.btn.grn{background:var(--grn);color:#fff;border-color:var(--grn)}.btn.grn:hover{opacity:.87}
.btn.amb{background:var(--gold);color:#1B2A4A;border-color:var(--gold)}.btn.amb:hover{opacity:.87}
.btn.imp{background:var(--gold-s);color:var(--gold-t);border-color:var(--gold)}.btn.imp:hover{background:var(--gold);color:#1B2A4A}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:14px}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 12px;box-shadow:var(--shd);cursor:pointer;transition:all .15s}
.stat:hover{border-color:var(--bdr2)}
.stat.on{border-color:var(--navy);background:var(--navy)}
.stat.on .sn,.stat.on .sl{color:#fff}
.sn{font-size:20px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.sl{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* View bar */
.vbar{display:flex;gap:0;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;width:fit-content;box-shadow:var(--shd)}
.vbtn{padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surf);color:var(--text2);border:none;border-right:1px solid var(--bdr);font-family:var(--font);display:flex;align-items:center;gap:5px;transition:background .15s,color .15s;white-space:nowrap}
.vbtn:last-child{border-right:none}
.vbtn:hover{background:var(--surf2)}
.vbtn.on{background:var(--navy);color:#fff}

/* Toolbar */
.tbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tbar input[type=text],.tbar select{height:32px;font-size:13px;padding:0 10px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.tbar input[type=text]{flex:1;min-width:150px}
.tbar input:focus,.tbar select:focus{border-color:var(--bdr2)}

/* Filter tabs */
.ftabs{display:flex;gap:3px;flex-wrap:wrap;margin:8px 0}
.ftab{padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;border-radius:20px;color:var(--text2);background:none;font-family:var(--font);transition:all .15s}
.ftab:hover{background:var(--surf);border-color:var(--bdr)}
.ftab.on{background:var(--surf);border-color:var(--bdr2);color:var(--text);box-shadow:var(--shd)}

/* Badges */
.bdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
.b-prospect{background:#E8EDF5;color:#1B2A4A}
.b-active{background:var(--grn-s);color:var(--grn-t)}
.b-proposal{background:var(--gold-s);color:var(--gold-t)}
.b-won{background:var(--tel-s);color:var(--tel-t)}
.b-lost{background:var(--red-s);color:var(--red-t)}
.b-customer{background:#E8EDF5;color:#1B2A4A}
.b-on-hold{background:var(--grys);color:var(--gryt)}
.b-new-request{background:var(--gold-s);color:var(--gold-t)}
.b-acc{background:#E8EDF5;color:#1B2A4A;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:600}
.b-pro{background:var(--gold-s);color:var(--gold-t);font-size:9px;padding:1px 6px;border-radius:20px;font-weight:600}
.p-hi{color:var(--red);font-weight:600}
.p-md{color:#9A6B00;font-weight:600}
.p-lo{color:var(--grn);font-weight:600}
.due-ok{background:var(--grn-s);color:var(--grn-t)}
.due-soon{background:var(--amb-s);color:var(--amb-t)}
.due-over{background:var(--red-s);color:var(--red-t)}
.dpill{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:13px 15px;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:var(--shd)}
.card:hover{border-color:var(--bdr2);box-shadow:var(--shd-md)}
.card.is-acc{border-left:3px solid var(--navy)}
.card.is-pro{border-left:3px solid var(--gold)}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.c-name{font-size:15px;font-weight:600;letter-spacing:-.2px;line-height:1.3}
.c-sub{font-size:11px;color:var(--text2);margin-top:2px}
.c-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;margin-left:8px}
.c-row{display:flex;align-items:baseline;gap:6px;font-size:12px;margin-top:5px}
.c-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);min-width:44px;flex-shrink:0}
.c-val{color:var(--text);flex:1}
.next-box{background:var(--surf2);border-radius:var(--r);padding:7px 9px;margin-top:7px;border-left:2px solid var(--gold)}
.next-row{display:flex;justify-content:space-between;align-items:flex-start;gap:5px}
.next-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:1px}
.next-txt{font-size:12px;color:var(--text);line-height:1.45;flex:1;margin:0 5px}
.more-tasks{font-size:10px;color:var(--text3);margin-top:3px}
.hold-box{background:var(--grys);border-radius:var(--r);padding:5px 9px;margin-top:5px;font-size:11px;color:var(--gryt)}
.inst-row{display:flex;align-items:center;gap:5px;font-size:11px;margin-top:5px}
.inst-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.c-foot{display:flex;gap:8px;font-size:11px;color:var(--text2);margin-top:8px;padding-top:7px;border-top:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.empty-msg{text-align:center;padding:3rem;color:var(--text3);font-size:14px}

/* ── KANBAN ── */
.kb-wrap{overflow-x:auto;padding-bottom:10px}
.kb-board{display:flex;gap:10px;min-width:max-content;align-items:flex-start}
.kb-col{width:230px;flex-shrink:0;background:var(--surf2);border-radius:var(--rl);border:1px solid var(--bdr);overflow:hidden}
.kb-hdr{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.kb-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.kb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kb-cnt{font-size:10px;font-weight:600;background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:1px 7px;color:var(--text2)}
.kb-cards{padding:7px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.kb-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 11px;cursor:pointer;box-shadow:var(--shd);transition:border-color .15s,box-shadow .15s}
.kb-card:hover{border-color:var(--bdr2);box-shadow:var(--shd-md)}
.kb-card.is-acc{border-left:2px solid var(--navy)}
.kb-card.is-pro{border-left:2px solid var(--gold)}
.kb-name{font-size:13px;font-weight:600;margin-bottom:3px}
.kb-val{font-size:11px;color:var(--text2);margin-bottom:4px}
.kb-next{font-size:11px;color:var(--text);background:var(--surf2);border-radius:5px;padding:4px 7px;border-left:2px solid var(--gold);line-height:1.4;margin-bottom:5px}
.kb-foot{display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}
.kb-empty{font-size:11px;color:var(--text3);text-align:center;padding:14px 8px;font-style:italic}

/* ── TABLE ── */
.tbl-opts{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text2)}
.tbl-opts label{display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:500}
.tbl-wrap{overflow:auto;border:1px solid var(--bdr);border-radius:var(--rl);background:var(--surf);box-shadow:var(--shd)}
table.ct{width:100%;border-collapse:collapse;font-size:13px}
table.ct thead{position:sticky;top:0;z-index:10}
table.ct th{background:var(--surf2);color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 11px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none}
table.ct th:hover{background:var(--surf3);color:var(--text)}
table.ct th.sa::after{content:' ↑';color:var(--navy)}
table.ct th.sd::after{content:' ↓';color:var(--navy)}
table.ct td{padding:8px 11px;border-bottom:1px solid var(--bdr);vertical-align:middle}
table.ct tbody tr:last-child td{border-bottom:none}
table.ct tbody tr:hover td{background:var(--surf2);cursor:pointer}
table.ct tbody tr.r-acc td:first-child{border-left:3px solid var(--navy)}
table.ct tbody tr.r-pro td:first-child{border-left:3px solid var(--gold)}
.t-name{font-weight:600;font-size:13px}
.t-sub{font-size:11px;color:var(--text2);margin-top:1px}
.t-clip{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.t-act{text-align:right;white-space:nowrap}
.tsbtn{padding:3px 8px;font-size:11px;font-weight:500;border:1px solid var(--bdr);border-radius:5px;background:var(--surf);color:var(--text2);cursor:pointer;font-family:var(--font);margin-left:3px}
.tsbtn:hover{background:var(--surf2);color:var(--text)}
.tsbtn.del{color:var(--red);border-color:#f5c0c0}.tsbtn.del:hover{background:var(--red-s)}
tr.exp-row td{background:var(--surf2)!important;cursor:default!important;padding:10px 14px;font-size:12px;border-bottom:1px solid var(--bdr)}
.exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:8px}
.ef label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);display:block;margin-bottom:2px}
.ef p{font-size:12px;color:var(--text);line-height:1.5}

/* ── TASK LIST ── */
.tk-opts{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tk-opts select{height:32px;font-size:13px;padding:0 9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.tk-opts .hint{font-size:11px;color:var(--text3);margin-left:4px}
.tk-wrap{border:1px solid var(--bdr);border-radius:var(--rl);background:var(--surf);box-shadow:var(--shd);overflow:hidden}
table.tkt{width:100%;border-collapse:collapse;font-size:13px}
table.tkt thead{position:sticky;top:0;z-index:10}
table.tkt th{background:var(--surf2);color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none}
table.tkt th:hover{background:var(--surf3)}
table.tkt th.sa::after{content:' ↑';color:var(--navy)}
table.tkt th.sd::after{content:' ↓';color:var(--navy)}
table.tkt td{padding:9px 12px;border-bottom:1px solid var(--bdr);vertical-align:top}
table.tkt tbody tr:last-child td{border-bottom:none}
table.tkt tbody tr:hover td{background:var(--surf2);cursor:pointer}
.tk-over td{background:#fff8f8}
.tk-soon td{background:#fffcf0}
.tk-grp td{background:var(--surf3)!important;cursor:default!important;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:5px 12px;border-bottom:1px solid var(--bdr)}
.tk-cnt{font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;margin-left:8px;background:var(--surf);color:var(--text2);border:1px solid var(--bdr)}
.tk-co{font-weight:600;font-size:13px}
.tk-type{font-size:10px;margin-top:2px}
.tk-title{font-size:13px;color:var(--text);line-height:1.5}
.tk-due-big{font-size:13px;font-weight:600}
.tk-due-rel{font-size:11px;color:var(--text2);margin-top:2px}
.tk-empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(18,18,16,.42);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--surf);border-radius:var(--rxl);border:1px solid var(--bdr);padding:22px;width:min(570px,96vw);max-height:92vh;overflow-y:auto;box-shadow:var(--shd-md)}
.mh{font-size:16px;font-weight:600;letter-spacing:-.2px;margin-bottom:16px}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--bdr)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fr.full{grid-template-columns:1fr}
.fr.tri{grid-template-columns:1fr 1fr 1fr}
.fr label{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;font-weight:500}
.fr label .opt{font-style:italic;color:var(--text3);font-weight:400}
.fr input,.fr select,.fr textarea{width:100%;height:32px;font-size:13px;padding:0 9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--bdr2)}
.fr input[type=date]{padding:0 7px}
.fr textarea{height:62px;padding:7px 9px;resize:vertical}
.type-toggle{display:flex;gap:6px;margin-bottom:10px}
.tpbtn{padding:6px 13px;font-size:13px;border:1px solid var(--bdr);border-radius:20px;cursor:pointer;background:var(--surf);color:var(--text2);font-family:var(--font);font-weight:500;transition:all .15s}
.tpbtn.pro{background:var(--gold-s);color:var(--gold-t);border-color:var(--gold)}
.tpbtn.acc{background:#E8EDF5;color:var(--navy);border-color:var(--navy)}
.ctog{display:flex;align-items:center;gap:8px;margin:10px 0 4px;cursor:pointer;user-select:none;font-size:12px;color:var(--text2);font-weight:500}
.ctog input{cursor:pointer;accent-color:var(--navy)}
.csec{display:none}
.csec.show{display:block}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bdr)}
/* Detail modal */
.dl{font-size:10px;color:var(--text2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.dv{font-size:13px;color:var(--text);line-height:1.5}
.d2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.dbox{background:var(--surf2);border-radius:var(--r);padding:9px 11px;margin-bottom:9px}
.dbox.gold{border-left:3px solid var(--gold)}
.dbox.navy{border-left:3px solid var(--navy)}
.dbox.hold{background:var(--grys);border-left:3px solid #999}
/* Task UI inside detail */
.task-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.task-hdr-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.show-done{font-size:11px;color:var(--text3);cursor:pointer;font-weight:500}
.show-done:hover{color:var(--text2)}
.task-list{display:flex;flex-direction:column;gap:5px}
.titem{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px}
.titem.done{opacity:.5}
.titem input[type=checkbox]{accent-color:var(--navy);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.titem .tt{flex:1;color:var(--text);line-height:1.4}
.titem.done .tt{text-decoration:line-through;color:var(--text3)}
.titem .tdp{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tdel{width:20px;height:20px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:0}
.tdel:hover{background:var(--red-s);color:var(--red)}
.add-task{display:flex;gap:6px;margin-top:8px;align-items:center}
.add-task input[type=text]{flex:1;height:30px;font-size:12px;padding:0 8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.add-task input[type=text]:focus{border-color:var(--bdr2)}
.add-task input[type=date]{height:30px;font-size:12px;padding:0 6px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.add-task input[type=date]:focus{border-color:var(--bdr2)}
.add-task .abtn{height:30px;padding:0 12px;font-size:12px;font-weight:600;border:1px solid var(--gold);border-radius:var(--r);background:var(--gold-s);color:var(--gold-t);cursor:pointer;white-space:nowrap;font-family:var(--font)}
.add-task .abtn:hover{background:var(--gold);color:#1B2A4A}
/* PDF modal */
.prow{display:flex;gap:10px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.prow label{font-size:13px;color:var(--text2);font-weight:500;min-width:68px}
.prow select{height:31px;font-size:13px;padding:0 8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font)}
.notebox{background:var(--surf2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6}
/* Import preview */
.imp4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
/* Print */
@media print{

<script>
// ── State ──────────────────────────────────────────────────────────────────
const STORE      = 'rc_tracker_v1';
const SYNC_STORE = 'rc_sync_cfg';
const QUEUE_STORE= 'rc_sync_queue';
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let REC = [], NID = 1, TID = 100;
let activeTab = 'all', activeView = 'cards';
let tblSort = '', tblDir = 1, expandedRow = null;
let pendingImport = [];

// ── Sync config ────────────────────────────────────────────────────────────
// syncCfg: { scriptUrl: string }
let syncCfg = {};
let syncQueue = []; // array of {id, op:'push'|'delete', ts, data}
let syncInFlight = false;
let isOnline = navigator.onLine;

function loadSyncCfg() {
  try { syncCfg  = JSON.parse(localStorage.getItem(SYNC_STORE)  || '{}'); } catch(e) { syncCfg = {}; }
  try { syncQueue = JSON.parse(localStorage.getItem(QUEUE_STORE) || '[]'); } catch(e) { syncQueue = []; }
}
function saveSyncCfg() { localStorage.setItem(SYNC_STORE, JSON.stringify(syncCfg)); }
function saveQueue()   { localStorage.setItem(QUEUE_STORE, JSON.stringify(syncQueue)); }

// ── Connectivity listeners ─────────────────────────────────────────────────
window.addEventListener('online',  () => { isOnline = true;  updateSyncStatus(); flushQueue(); });
window.addEventListener('offline', () => { isOnline = false; updateSyncStatus(); });

function updateSyncStatus() {
  const el = $('sync-status'); if (!el) return;
  const btn = $('sync-btn');
  if (!syncCfg.scriptUrl) {
    el.innerHTML = '<span style="color:var(--text3)">☁ Sync not configured</span>';
    if (btn) btn.style.borderColor = '';
    return;
  }
  if (!isOnline) {
    const q = syncQueue.length;
    el.innerHTML = `<span style="color:var(--amb)">📵 Offline${q ? ` — ${q} change${q>1?'s':''} queued` : ''}</span>`;
    if (btn) { btn.style.background='var(--amb-s)'; btn.style.color='var(--amb-t)'; btn.style.borderColor='var(--gold)'; }
    return;
  }
  if (syncInFlight) {
    el.innerHTML = '<span style="color:var(--text3)">⟳ Syncing…</span>';
    return;
  }
  if (syncQueue.length) {
    el.innerHTML = `<span style="color:var(--amb)">⏳ ${syncQueue.length} pending</span>`;
    return;
  }
  el.innerHTML = '<span style="color:var(--grn)">✓ Synced</span>';
  if (btn) { btn.style.background=''; btn.style.color=''; btn.style.borderColor=''; }
}

// ── Google Sheets push/pull ────────────────────────────────────────────────
// Apps Script redirects every request. Use GET-only with encoded payload to
// avoid CORS preflight failures entirely.
async function pushToSheets(fullData) {
  if (!syncCfg.scriptUrl) return;
  const payload = encodeURIComponent(JSON.stringify({
    rec: fullData.rec, nid: fullData.nid, tid: fullData.tid, ts: fullData.ts
  }));
  const url = syncCfg.scriptUrl + '?action=set&d=' + payload + '&cb=' + Date.now();
  const resp = await fetch(url, {redirect: 'follow'});
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}
async function pullFromSheets() {
  if (!syncCfg.scriptUrl) return null;
  const url = syncCfg.scriptUrl + '?action=get&cb=' + Date.now();
  const resp = await fetch(url, {redirect: 'follow'});
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

// ── Queue flush ────────────────────────────────────────────────────────────
async function flushQueue() {
  if (!syncCfg.scriptUrl || !isOnline || syncInFlight || !syncQueue.length) return;
  syncInFlight = true; updateSyncStatus();
  try {
    const ts = Date.now();
    const payload = {rec: REC, nid: NID, tid: TID, ts};
    await pushToSheets(payload);
    syncQueue = []; saveQueue();
    // Record when we last successfully pushed so loadFromSheets knows
    // not to overwrite local data with older remote data
    localStorage.setItem('rc_last_push_ts', String(ts));
  } catch(e) {
    console.warn('Sync flush failed:', e);
  }
  syncInFlight = false; updateSyncStatus();
}

// Queue a change and try to flush immediately
// Returns a promise that resolves when the flush completes (or fails)
async function queueSync() {
  syncQueue.push({ts: Date.now()});
  saveQueue(); updateSyncStatus();
  if (isOnline) await flushQueue();
}

// ── Load from Sheets on startup (if online) ────────────────────────────────
async function loadFromSheets() {
  if (!syncCfg.scriptUrl || !isOnline) return false;
  try {
    syncInFlight = true; updateSyncStatus();
    const d = await pullFromSheets();
    if (!d) { syncInFlight = false; updateSyncStatus(); return false; }

    // Use the remote ts as the source of truth, even when rec is empty.
    // This is critical so deletions on one device propagate to others.
    const lastPushTs  = parseInt(localStorage.getItem('rc_last_push_ts') || '0');
    const remoteTs    = d.ts || 0;
    const hasPending  = syncQueue.length > 0;
    const remoteRec   = Array.isArray(d.rec) ? d.rec : [];

    if (hasPending) {
      // We have local changes that haven't synced yet — push them up
      await flushQueue();
    } else if (remoteTs > lastPushTs) {
      // Remote is genuinely newer — accept it as authoritative
      // (this includes the case where remote has fewer records due to deletes
      // on another device, OR remote is empty)
      REC = remoteRec;
      NID = d.nid || NID;
      TID = d.tid || TID;
      localStorage.setItem(STORE, JSON.stringify({rec:REC, nid:NID, tid:TID}));
      localStorage.setItem('rc_last_push_ts', String(remoteTs));
      render();
    } else if (remoteTs === 0 && lastPushTs === 0 && remoteRec.length > 0 && REC.length === 0) {
      // First-ever load on a brand-new device: no timestamps yet, accept remote
      REC = remoteRec;
      NID = d.nid || NID;
      TID = d.tid || TID;
      localStorage.setItem(STORE, JSON.stringify({rec:REC, nid:NID, tid:TID}));
      render();
    } else {
      // Local is newer or tied — push local up to make sure remote matches
      // (only if our local actually has content OR we know we have a recent push)
      if (lastPushTs > 0 || REC.length > 0) {
        syncQueue.push({ts: Date.now()}); saveQueue();
        await flushQueue();
      }
    }
    syncInFlight = false; updateSyncStatus();
    return true;
  } catch(e) {
    console.warn('Could not load from Sheets:', e);
    syncInFlight = false; updateSyncStatus();
    return false;
  }
}

// ── Utility ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function save() {
  localStorage.setItem(STORE, JSON.stringify({rec: REC, nid: NID, tid: TID}));
  const el = $('sv'); if (el) el.textContent = 'Saved ' + new Date().toLocaleTimeString();
  queueSync(); // async — fires and forgets for normal saves; deletes use saveAndWait
}
async function saveAndWait() {
  localStorage.setItem(STORE, JSON.stringify({rec: REC, nid: NID, tid: TID}));
  const el = $('sv'); if (el) el.textContent = 'Saved ' + new Date().toLocaleTimeString();
  await queueSync();
}
function load() {
  loadSyncCfg();
  try {
    const d = JSON.parse(localStorage.getItem(STORE) || '{}');
    if (d.rec && d.rec.length) { REC = d.rec; NID = d.nid || 1; TID = d.tid || 100; }
    else seed();
  } catch(e) { seed(); }
}
function tid() { return 'tk' + (TID++); }
function pDate(s) { if (!s) return null; const d = new Date(s + 'T00:00:00'); return isNaN(d) ? null : d; }
function dDiff(s) { const d = pDate(s); return d ? Math.round((d - TODAY) / 864e5) : null; }
function dStat(s) { const x = dDiff(s); if (x === null) return 'none'; if (x < 0) return 'over'; if (x <= 3) return 'soon'; return 'ok'; }
function dLbl(s) {
  const x = dDiff(s);
  if (x === null) return '';
  if (x < 0) return 'Overdue ' + Math.abs(x) + 'd';
  if (x === 0) return 'Due today';
  if (x === 1) return 'Due tomorrow';
  return 'Due ' + fDate(s);
}
function fDate(s) {
  if (!s) return '';
  const d = pDate(s);
  return d ? d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : s;
}
function dpCls(s) { const st = dStat(s); return st === 'over' ? 'due-over' : st === 'soon' ? 'due-soon' : 'due-ok'; }
function scls(s) { return 'b-' + s.toLowerCase().replace(/\s+/g,'-'); }
function pcls(p) { return p === 'High' ? 'p-hi' : p === 'Medium' ? 'p-md' : 'p-lo'; }
function sdot(s) {
  const m = {Prospect:'#1B2A4A',Active:'#1A7A52',Proposal:'#C9A84C',Won:'#0D4A2F',Lost:'#B83030',Customer:'#1B2A4A','On Hold':'#9B8F82','New Request':'#C9A84C'};
  return m[s] || '#aaa';
}
function sbg(s) {
  const m = {Prospect:'#E8EDF5',Active:'#E0F3EA',Proposal:'#F5E6B8',Won:'#D6F0E8',Lost:'#FAE8E8',Customer:'#E8EDF5','On Hold':'#EDE5D8','New Request':'#F5E6B8'};
  return m[s] || '#eee';
}
function sfg(s) {
  const m = {Prospect:'#1B2A4A',Active:'#0D4A2F',Proposal:'#7A5E10',Won:'#0D4A2F',Lost:'#741C1C',Customer:'#1B2A4A','On Hold':'#3D2E1E','New Request':'#7A5E10'};
  return m[s] || '#333';
}
function openTasks(r) { return (r.tasks || []).filter(t => !t.done); }
function soonest(r) {
  return openTasks(r).filter(t => t.due).sort((a,b) => pDate(a.due) - pDate(b.due))[0]
    || openTasks(r).filter(t => !t.due)[0]
    || null;
}

// ── Seed data ──────────────────────────────────────────────────────────────
function seed() {
  REC = [
    {id:1,type:'prospect',company:'Meridian Health',name:'Sarah Chen',stage:'Prospect',priority:'High',value:'$42,000',contact:'sarah.chen@meridian.com',phone:'404-555-0182',owner:'You',need:'Replace legacy billing module. Manual reconciliation taking 3 days/month.',installDate:'2026-06-15',holdReason:'',
     tasks:[{id:'tk1',title:'Send capability overview deck',due:'2026-04-18',done:false},{id:'tk2',title:'Schedule follow-up call after deck review',due:'2026-04-25',done:false}]},
    {id:2,type:'prospect',company:'BluePeak Logistics',name:'Tom Grady',stage:'Active',priority:'High',value:'$78,000',contact:'t.grady@bluepeak.com',phone:'770-555-0241',owner:'You',need:'Real-time freight tracking + custom reporting. Evaluating 3 vendors.',installDate:'',holdReason:'',
     tasks:[{id:'tk3',title:'Follow up on proposal — confirm decision timeline',due:'2026-04-16',done:false},{id:'tk4',title:'Prepare demo for custom reporting module',due:'2026-04-28',done:false}]},
    {id:3,type:'prospect',company:'Atlas Fabrication',name:'Dana Mills',stage:'On Hold',priority:'Medium',value:'$25,000',contact:'dmills@atlasfab.com',phone:'678-555-0093',owner:'You',need:'Inventory forecasting and supplier portal.',installDate:'',holdReason:'Budget freeze until Q3 — confirmed Apr 12',
     tasks:[{id:'tk5',title:'Re-engage after budget freeze lifts',due:'2026-07-01',done:false}]},
    {id:4,type:'account',company:'SunPath Energy',name:'Marcus Rivera',stage:'Customer',priority:'Medium',value:'$110,000',contact:'mrivera@sunpath.com',phone:'404-555-0317',owner:'You',need:'Active managed account. Annual contract in place.',installDate:'2026-07-20',holdReason:'',
     tasks:[{id:'tk6',title:'Quarterly review — prep expansion quote',due:'2026-05-02',done:false},{id:'tk7',title:'Confirm equipment specs for 2 new offices',due:'2026-05-15',done:false},{id:'tk8',title:'Send revised SLA for renewal',due:'2026-06-01',done:false}]},
    {id:5,type:'account',company:'CoreEdge Retail',name:'Jill Patterson',stage:'New Request',priority:'High',value:'$19,500',contact:'j.patterson@coreedge.com',phone:'678-555-0044',owner:'You',need:'4 new POS terminals for expanded floor. Updated maintenance plan needed.',installDate:'2026-05-15',holdReason:'',
     tasks:[{id:'tk9',title:'Build equipment quote for 4 POS terminals',due:'2026-04-22',done:false},{id:'tk10',title:'Draft revised maintenance plan options',due:'2026-04-22',done:false},{id:'tk11',title:'Book hotel for install — need by May 14',due:'2026-04-30',done:false}]},
    {id:6,type:'prospect',company:'Landmark Capital',name:'Kevin Osei',stage:'Proposal',priority:'Medium',value:'$55,000',contact:'k.osei@landmark.com',phone:'404-555-0088',owner:'You',need:'Document management + e-signature workflow.',installDate:'2026-06-01',holdReason:'',
     tasks:[{id:'tk12',title:'Final proposal review call with stakeholders',due:'2026-04-25',done:false}]}
  ];
  NID = 7; TID = 20; save();
}

// ── View / Tab control ─────────────────────────────────────────────────────
function setView(el) {
  activeView = el.dataset.v;
  document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('on')); el.classList.add('on');
  ['cards','kanban','table','tasks'].forEach(v => $('v-'+v).style.display = activeView===v ? 'block' : 'none');
  const hide = activeView === 'kanban' || activeView === 'tasks';
  $('ftabs').style.display = hide ? 'none' : '';
  $('main-tbar').style.display = activeView === 'tasks' ? 'none' : '';
  render();
}
function setTab(el) {
  activeTab = el.dataset.t;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on')); el.classList.add('on');
  expandedRow = null; render();
}
function quickFilter(tab) {
  activeTab = tab;
  document.querySelectorAll('.ftab').forEach(t => t.classList.toggle('on', t.dataset.t === tab));
  if (activeView === 'kanban' || activeView === 'tasks') {
    setView(document.querySelector('[data-v="cards"]'));
  } else render();
}

// ── Filtering ──────────────────────────────────────────────────────────────
function filtered() {
  const q = ($('srch') || {value:''}).value.toLowerCase();
  const sf = ($('sf') || {value:''}).value;
  const pf = ($('pf') || {value:''}).value;
  return REC.filter(r => {
    if (activeTab === 'prospect' && r.type !== 'prospect') return false;
    if (activeTab === 'account'  && r.type !== 'account')  return false;
    if (activeTab === 'request'  && !(r.type === 'account' && r.stage === 'New Request')) return false;
    if (activeTab === 'hold'     && r.stage !== 'On Hold')  return false;
    if (activeTab === 'due') {
      const hasDue = openTasks(r).some(t => { const x = dDiff(t.due); return x !== null && x <= 7 && x >= 0; });
      if (!hasDue) return false;
    }
    if (sf && r.stage !== sf) return false;
    if (pf && r.priority !== pf) return false;
    if (q && !`${r.company} ${r.name||''} ${r.need||''} ${(r.tasks||[]).map(t=>t.title).join(' ')} ${r.holdReason||''}`.toLowerCase().includes(q)) return false;
    return true;
  });
}

// ── Stats ──────────────────────────────────────────────────────────────────
function renderStats() {
  const p    = REC.filter(r => r.type === 'prospect').length;
  const a    = REC.filter(r => r.type === 'account').length;
  const req  = REC.filter(r => r.type === 'account' && r.stage === 'New Request').length;
  const h    = REC.filter(r => r.stage === 'On Hold').length;
  const over = REC.filter(r => openTasks(r).some(t => dStat(t.due) === 'over')).length;
  const due  = REC.filter(r => openTasks(r).some(t => { const s = dStat(t.due); return s === 'soon' || s === 'over'; })).length;
  const inst = REC.filter(r => { if (!r.installDate) return false; const x = dDiff(r.installDate); return x !== null && x >= 0 && x <= 30; }).length;
  $('stats-bar').innerHTML = `
    <div class="stat" onclick="quickFilter('prospect')"><div class="sn">${p}</div><div class="sl">Prospects</div></div>
    <div class="stat" onclick="quickFilter('account')"><div class="sn">${a}</div><div class="sl">My Accounts</div></div>
    <div class="stat" onclick="quickFilter('request')"><div class="sn">${req}</div><div class="sl">Requests</div></div>
    <div class="stat" onclick="quickFilter('hold')"><div class="sn">${h}</div><div class="sl">On Hold</div></div>
    <div class="stat" onclick="quickFilter('due')"><div class="sn" style="color:${over>0?'var(--red)':'inherit'}">${due}</div><div class="sl">Due Soon</div></div>
    <div class="stat" style="cursor:default"><div class="sn" style="color:${inst>0?'var(--amb)':'inherit'}">${inst}</div><div class="sl">Installs ≤30d</div></div>
    <div class="stat" style="cursor:default"><div class="sn">${REC.length}</div><div class="sl">Total</div></div>`;
}

function render() {
  renderStats();

// ── Table ──────────────────────────────────────────────────────────────────
function renderTable() {
  const pOrd = {High:0,Medium:1,Low:2};
  const sOrd = {Prospect:0,Active:1,Proposal:2,'New Request':3,Customer:4,'On Hold':5,Won:6,Lost:7};
  let list = filtered();
  if (tblSort) {
    list = [...list].sort((a,b) => {
      if (tblSort === 'due') {
        const sa = soonest(a), sb = soonest(b);
        const da = sa&&sa.due?pDate(sa.due):null, db = sb&&sb.due?pDate(sb.due):null;
        if (da&&db) return tblDir*(da-db); return da?-tblDir:tblDir;
      }
      if (tblSort === 'install') { const da=pDate(a.installDate),db=pDate(b.installDate); if(da&&db)return tblDir*(da-db);return da?-tblDir:tblDir; }
      if (tblSort === 'priority') return tblDir*((pOrd[a.priority]??9)-(pOrd[b.priority]??9));
      if (tblSort === 'stage') return tblDir*((sOrd[a.stage]??9)-(sOrd[b.stage]??9));
      return tblDir*String(a[tblSort]||'').localeCompare(String(b[tblSort]||''));
    });
  }
  const sv = $('c-val')?.checked, si = $('c-inst')?.checked, sp = $('c-pri')?.checked;
  const sc = $('c-cont')?.checked, sph = $('c-phone')?.checked;
  function th(lbl,key) { const a = tblSort===key; return `<th class="${a?(tblDir===1?'sa':'sd'):''}" onclick="tSort('${key}')">${lbl}</th>`; }
  const thead = `<thead><tr>
    ${th('Company','company')}${th('Stage','stage')}${sp?th('Priority','priority'):''}
    ${th('Need','need')}${th('Next Task','task')}${th('Due','due')}
    ${si?th('Install Date','install'):''}${sv?th('Value','value'):''}
    ${sc?th('Email','contact'):''}${sph?th('Phone','phone'):''}<th></th>
  </tr></thead>`;
  const tbody = '<tbody>' + list.map(r => {
    const isA = r.type === 'account';
    const st  = soonest(r);
    const ot  = openTasks(r).length;
    const dl  = st&&st.due ? dLbl(st.due) : '';
    const iDs = dStat(r.installDate);
    const iCls = iDs==='over'?'due-over':iDs==='soon'?'due-soon':'due-ok';
    const isExp = expandedRow === r.id;
    const colCount = 6+(sp?1:0)+(si?1:0)+(sv?1:0)+(sc?1:0)+(sph?1:0)+1;
    let row = `<tr class="${isA?'r-acc':'r-pro'}" onclick="toggleExp(${r.id})">
      <td><div class="t-name">${r.company}</div>${r.name?`<div class="t-sub">${r.name}</div>`:''}</td>
      <td><span class="bdg ${scls(r.stage)}">${r.stage}</span></td>
      ${sp?`<td><span class="${pcls(r.priority)}">${r.priority}</span></td>`:''}
      <td><div class="t-clip" title="${r.need||''}">${r.need||'—'}</div></td>
      <td><div class="t-clip">${st?st.title.substring(0,50)+(st.title.length>50?'…':'')+(ot>1?` <span style="color:var(--text3);font-size:10px">(+${ot-1})</span>`:''): '<span style="color:var(--text3)">—</span>'}</div></td>
      <td>${dl?`<span class="dpill ${dpCls(st.due)}">${dl}</span>`:'<span style="color:var(--text3);font-size:11px">—</span>'}</td>
      ${si?`<td>${r.installDate?`<span class="dpill ${iCls}" style="font-size:11px">${fDate(r.installDate)}</span>`:'<span style="color:var(--text3);font-size:11px">—</span>'}</td>`:''}
      ${sv?`<td>${r.value||'—'}</td>`:''}
      ${sc?`<td style="font-size:12px">${r.contact||'—'}</td>`:''}
      ${sph?`<td>${r.phone||'—'}</td>`:''}
      <td class="t-act" onclick="event.stopPropagation()">
        <button class="tsbtn" onclick="openEdit(${r.id})">Edit</button>
        <button class="tsbtn del" onclick="delRec(${r.id})">Del</button>
      </td>
    </tr>`;
    if (isExp) {
      row += `<tr class="exp-row"><td colspan="${colCount}">
        <div class="exp-grid">
          ${r.need?`<div class="ef" style="grid-column:1/-1"><label>Need / Request</label><p>${r.need}</p></div>`:''}
          ${r.holdReason?`<div class="ef" style="grid-column:1/-1"><label>Hold reason</label><p>${r.holdReason}</p></div>`:''}
          ${r.contact?`<div class="ef"><label>Email</label><p>${r.contact}</p></div>`:''}
          ${r.phone?`<div class="ef"><label>Phone</label><p>${r.phone}</p></div>`:''}
          ${r.value?`<div class="ef"><label>Value</label><p>${r.value}</p></div>`:''}
          ${r.owner?`<div class="ef"><label>Owner</label><p>${r.owner}</p></div>`:''}
        </div>
        ${openTasks(r).length?`<div style="margin-top:8px">
          <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)">Open Tasks (${openTasks(r).length})</label>
          <p style="font-size:12px;color:var(--text);margin-top:4px;line-height:1.8;white-space:pre-line">${openTasks(r).map((t,i)=>(i+1)+'. '+t.title+(t.due?' — due '+fDate(t.due):'')).join('\n')}</p>
        </div>`:''}
        <div style="margin-top:8px;display:flex;gap:6px">
          <button class="btn" style="height:27px;font-size:11px" onclick="openDetail(${r.id})">Full view</button>

        </div>
      </td></tr>`;
    }
    return row;
  }).join('') + '</tbody>';
  $('ct').innerHTML = thead + tbody;
}
function tSort(col) { if (tblSort===col) tblDir*=-1; else {tblSort=col;tblDir=1;} renderTable(); }
function toggleExp(id) { expandedRow = expandedRow===id ? null : id; renderTable(); }

// ── Task List ──────────────────────────────────────────────────────────────
let taskTab = 'open'; // 'open' | 'completed'

function setTaskTab(tab) {
  taskTab = tab;
  $('tktab-open').classList.toggle('on', tab === 'open');
  $('tktab-completed').classList.toggle('on', tab === 'completed');
  $('tk-scope').style.display     = tab === 'open'      ? '' : 'none';
  $('tk-daterange').style.display = tab === 'completed' ? '' : 'none';
  renderTasks();
}

// Returns {start, end} Date objects for a date range key
function dateRangeBounds(key) {
  const now = new Date(); now.setHours(23,59,59,999);
  if (!key || key === 'all') return {start: null, end: null};
  if (/^\d+$/.test(key)) {
    const start = new Date(); start.setDate(start.getDate() - parseInt(key)); start.setHours(0,0,0,0);
    return {start, end: now};
  }
  // Quarters use current calendar year
  const y = new Date().getFullYear();
  const qMap = {q1:[0,0,2,31], q2:[3,1,5,30], q3:[6,1,8,30], q4:[9,1,11,31]};
  const [sm,sd,em,ed] = qMap[key];
  return {start: new Date(y,sm,sd,0,0,0,0), end: new Date(y,em,ed,23,59,59,999)};
}

function renderTasks() {
  renderStats();
  const scope   = $('tk-scope')?.value    || 'all';
  const drKey   = $('tk-daterange')?.value || 'all';
  const sortBy  = $('tk-sort')?.value     || 'due';
  const groupBy = $('tk-group')?.value    || 'none';
  const pOrd    = {High:0,Medium:1,Low:2};
  const sOrd    = {Prospect:0,Active:1,Proposal:2,'New Request':3,Customer:4,'On Hold':5,Won:6,Lost:7};
  const {start: drStart, end: drEnd} = dateRangeBounds(drKey);

  let items = [];
  REC.forEach(r => {
    (r.tasks || []).forEach(t => {
      if (taskTab === 'completed') {
        if (!t.done) return;
        // Date range filter on due date (or doneDate if present, fallback to due)
        if (drStart) {
          const d = pDate(t.doneDate || t.due);
          if (!d || d < drStart || d > drEnd) return;
        }
      } else {
        // Open tasks tab
        if (t.done) return;
        if (scope === 'due7')   { const x=dDiff(t.due); if(x===null||x>7||x<0)return; }
        if (scope === 'due30')  { const x=dDiff(t.due); if(x===null||x>30||x<0)return; }
        if (scope === 'over')   { if(dStat(t.due)!=='over')return; }
        if (scope === 'nodate') { if(t.due)return; }
        if (scope === 'install'){ if(!r.installDate)return; }
      }
      items.push({r, t});
    });
  });

  items.sort((a,b) => {
    if (sortBy==='due')      { const da=pDate(a.t.due),db=pDate(b.t.due); if(da&&db)return da-db; return da?-1:db?1:0; }
    if (sortBy==='install')  { const da=pDate(a.r.installDate),db=pDate(b.r.installDate); if(da&&db)return da-db; return da?-1:db?1:0; }
    if (sortBy==='company')  return a.r.company.localeCompare(b.r.company);
    if (sortBy==='priority') return (pOrd[a.r.priority]??9)-(pOrd[b.r.priority]??9);
    if (sortBy==='stage')    return (sOrd[a.r.stage]??9)-(sOrd[b.r.stage]??9);
    return 0;
  });

  const thead = `<thead><tr>
    <th>Company</th><th>Stage</th><th>Task</th>
    <th>Due Date</th><th>Install Date</th><th>Priority</th><th></th>
  </tr></thead>`;

  function tkRow({r, t}) {
    const ds   = dStat(t.due);
    const dl   = dLbl(t.due);
    const dCls = ds==='over'?'due-over':ds==='soon'?'due-soon':'due-ok';
    const iDiff= dDiff(r.installDate);
    const iDs  = dStat(r.installDate);
    const iCls = iDs==='over'?'due-over':iDs==='soon'?'due-soon':'due-ok';
    const rowCls = t.done?'':(ds==='over'?'tk-over':ds==='soon'?'tk-soon':'');
    const isA  = r.type==='account';
    return `<tr class="${rowCls}" style="${t.done?'opacity:.5':''}" onclick="openDetail(${r.id})">
      <td><div class="tk-co">${r.company}</div><span class="${isA?'b-acc':'b-pro'} tk-type">${isA?'Account':'Prospect'}</span></td>
      <td><span class="bdg ${scls(r.stage)}">${r.stage}</span></td>
      <td><div class="tk-title" style="${t.done?'text-decoration:line-through;color:var(--text3)':''}">${t.title}</div></td>
      <td>
        ${dl&&!t.done?`<div class="tk-due-big"><span class="dpill ${dCls}">${dl}</span></div><div class="tk-due-rel">${fDate(t.due)}</div>`
          :t.due?`<span style="font-size:11px;color:var(--text3)">${fDate(t.due)}</span>`
          :'<span style="color:var(--text3);font-size:12px">—</span>'}
      </td>
      <td>
        ${r.installDate?`<div><span class="dpill ${iCls}" style="font-size:11px">${fDate(r.installDate)}</span></div>${iDiff!==null?`<div class="tk-due-rel">${iDiff<0?'Overdue':iDiff===0?'Today':iDiff+'d away'}</div>`:''}`
          :'<span style="color:var(--text3);font-size:12px">—</span>'}
      </td>
      <td><span class="${pcls(r.priority)}">${r.priority}</span></td>
      <td onclick="event.stopPropagation()">
        <button class="tsbtn" onclick="toggleTask(${r.id},'${t.id}')">${t.done?'Reopen':'✓ Done'}</button>
      </td>
    </tr>`;
  }

  let tbody = '<tbody>';
  if (groupBy === 'none') {
    tbody += items.length
      ? items.map(tkRow).join('')
      : '<tr><td colspan="7" class="tk-empty">No tasks match the current filter.</td></tr>';
  } else {
    const gf = {
      urgency:  ({t}) => { const ds=dStat(t.due); return ds==='over'?'🔴 Overdue':ds==='soon'?'🟡 Due Soon':'🟢 Upcoming'; },
      stage:    ({r}) => r.stage,
      priority: ({r}) => r.priority + ' Priority',
      type:     ({r}) => r.type==='account'?'My Accounts':'Prospects'
    }[groupBy];
    const groups = {};
    items.forEach(item => { const k=gf(item); if(!groups[k])groups[k]=[]; groups[k].push(item); });
    if (!Object.keys(groups).length) {
      tbody += '<tr><td colspan="7" class="tk-empty">No tasks match the current filter.</td></tr>';
    } else {
      Object.entries(groups).forEach(([k,arr]) => {
        tbody += `<tr class="tk-grp"><td colspan="7">${k}<span class="tk-cnt">${arr.length}</span></td></tr>`;
        tbody += arr.map(tkRow).join('');
      });
    }
  }
  tbody += '</tbody>';
  $('tkt').innerHTML = thead + tbody;
}

function taskItemHTML(recId, t) {

function addTask(recId) {
  const ti = $('nt-title-'+recId), di = $('nt-due-'+recId);
  const title = ti ? ti.value.trim() : ''; if (!title) return;
  const r = REC.find(x => x.id === recId); if (!r) return;
  if (!r.tasks) r.tasks = [];
  r.tasks.push({id: tid(), title, due: di ? di.value || '' : '', done: false});
  save(); openDetail(recId); render();
}
function toggleTask(recId, taskId) {
  const r = REC.find(x => x.id === recId); if (!r) return;
  const t = (r.tasks||[]).find(x => x.id === taskId); if (!t) return;
  t.done = !t.done;
  if (t.done) {
    // Record the completion date for date-range filtering on the completed tab
    const now = new Date();
    t.doneDate = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  } else {
    delete t.doneDate;
  }
  save();
  if ($('ov-main').classList.contains('show')) openDetail(recId);
  render();
}
function deleteTask(recId, taskId) {
  const r = REC.find(x => x.id === recId); if (!r) return;
  r.tasks = (r.tasks||[]).filter(t => t.id !== taskId);
  save(); openDetail(recId); render();
}
function toggleShowDone(recId) {
  const list = $('tlist-'+recId); if (!list) return;
  const doneItems = [...list.querySelectorAll('.titem[data-done="true"]')];
  const anyHidden = doneItems.some(el => el.style.display === 'none');
  doneItems.forEach(el => el.style.display = anyHidden ? '' : 'none');
  const btn = $('sd-btn-'+recId);
  if (btn) btn.textContent = anyHidden ? 'Hide completed' : 'Show completed';
}
function delRec(id) {
  if (confirm('Delete this record? This cannot be undone.')) {
    REC = REC.filter(x => x.id !== id);
    closeModal('ov-main'); render();
    saveAndWait(); // awaits flush so Google Sheets is updated before any refresh
  }
}

function saveRec(id) {
  const chk = $('ct-chk')?.checked;

    type:      $('f-type').value,
    company:   $('f-co').value.trim(),
    stage:     $('f-stage').value,
    priority:  $('f-pri').value,
    value:     $('f-val').value.trim(),

    prospectStep: ($('f-type').value === 'prospect' && $('f-pstep')) ? $('f-pstep').value : '',
    need:      $('f-need').value.trim(),
    installDate:$('f-inst').value || '',
    name:    chk ? $('f-name')?.value.trim()    || '' : '',
    owner:   chk ? $('f-owner')?.value.trim()   || '' : '',
    contact: chk ? $('f-contact')?.value.trim() || '' : '',
    phone:   chk ? $('f-phone')?.value.trim()   || '' : ''
  };
  if (!v.company) { alert('Company / Location name is required.'); return; }
  // Determine previous prospect step (for auto-task generation)
  let prevStep = '';
  if (id !== 'null' && id !== null) {
    const existing = REC.find(x => x.id === id);
    if (existing) prevStep = existing.prospectStep || '';
  }
  let newRec;
  if (id === 'null' || id === null) {
    newRec = {id: NID++, ...v, tasks: []};
    REC.unshift(newRec);
  } else {
    const r = REC.find(x => x.id === id);
    const tasks = r.tasks || [];
    Object.assign(r, v);
    r.tasks = tasks;
    newRec = r;
  }
  // Auto-generate tasks when prospect step CHANGES to a trigger step
  if (v.type === 'prospect' && v.prospectStep && v.prospectStep !== prevStep) {
    autoGenStepTasks(newRec, v.prospectStep);
  }
  save(); closeModal('ov-main'); render();
}

// ── Auto-generate tasks based on prospect step ─────────────────────────────
function addDaysISO(days) {
  const d = new Date(TODAY); d.setDate(d.getDate() + days);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function autoGenStepTasks(rec, step) {
  if (!rec.tasks) rec.tasks = [];
  // Map step -> {title, daysOut}
  const map = {
    'CRF Complete and Submitted':        {title:'Follow up on CRF submission', days:5},
    'Equipment Ordered/Account Set up':  {title:'Confirm equipment delivery & account setup', days:7},
    'Agreement Executed':                {title:'CLOSE WON account', days:2}
  };
  const cfg = map[step]; if (!cfg) return;
  const due = addDaysISO(cfg.days);
  // Avoid duplicate: if an open task with same title already exists, skip
  const dup = rec.tasks.some(t => !t.done && t.title === cfg.title && t.autoStep === step);
  if (dup) return;
  rec.tasks.push({id: tid(), title: cfg.title, due, done:false, autoStep: step});
}

function doPrint() {
  const sortBy = $('ps').value, scope = $('pi').value, groupBy = $('pg').value;

  let list = REC.filter(r => {
    if (scope==='account')  return r.type==='account';
    if (scope==='prospect') return r.type==='prospect';

    if (scope==='hold')     return r.stage==='On Hold';
    if (scope==='request')  return r.type==='account'&&r.stage==='New Request';
    if (scope==='install')  return !!r.installDate;
    return true;
  });
  list = [...list].sort((a,b) => {
    if (sortBy==='due')      { const sa=soonest(a),sb=soonest(b);const da=sa&&sa.due?pDate(sa.due):null,db=sb&&sb.due?pDate(sb.due):null;if(da&&db)return da-db;return da?-1:db?1:0; }
    if (sortBy==='install')  { const da=pDate(a.installDate),db=pDate(b.installDate);if(da&&db)return da-db;return da?-1:db?1:0; }
    if (sortBy==='company')  return a.company.localeCompare(b.company);
    if (sortBy==='priority') return (pOrd[a.priority]??9)-(pOrd[b.priority]??9);
    return 0;
  });
  const now = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const thead = `<thead><tr>
    <th style="width:16%">Company</th><th style="width:9%">Stage</th><th style="width:7%">Priority</th>
    <th style="width:7%">Value</th><th style="width:22%">Need</th>
    <th style="width:20%">Next Task</th><th style="width:10%">Due Date</th><th style="width:9%">Install Date</th>
  </tr></thead>`;
  function rw(r) {
    const st=soonest(r), ot=openTasks(r);
    return `<tr>
      <td style="font-weight:600">${r.company}</td>
      <td><span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:${sbg(r.stage)};color:${sfg(r.stage)}">${r.stage}</span></td>
      <td style="font-size:10px;font-weight:700;color:${r.priority==='High'?'#B83030':r.priority==='Medium'?'#9A6B00':'#1A7A52'}">${r.priority}</td>

      <td style="font-size:10px">${r.need||'—'}</td>
      <td style="font-size:10px">${st?st.title+(ot.length>1?` (+${ot.length-1} more)`:''):'—'}</td>
      <td style="font-size:10px;white-space:nowrap">${st&&st.due?fDate(st.due):'—'}</td>
      <td style="font-size:10px;white-space:nowrap">${r.installDate?fDate(r.installDate):'—'}</td>
    </tr>`;
  }
  let body = '';
  if (groupBy === 'none') {
    body = `<table class="pt">${thead}<tbody>${list.map(rw).join('')}</tbody></table>`;
  } else {
    const gf = {type:r=>r.type==='account'?'My Accounts':'Prospects', stage:r=>r.stage, priority:r=>r.priority+' Priority'}[groupBy];
    const groups = {};
    list.forEach(r => { const k=gf(r); if(!groups[k])groups[k]=[]; groups[k].push(r); });
    body = Object.entries(groups).map(([k,rows]) =>
      `<div class="rpg">${k} (${rows.length})</div><table class="pt">${thead}<tbody>${rows.map(rw).join('')}</tbody></table>`
    ).join('');
  }
  $('print-area').innerHTML = `<div class="rph">Royal Cup — Sales Tracker Report</div><div class="rps">Generated ${now} · ${list.length} records</div>${body}`;
  closeModal('ov-pdf');
  setTimeout(() => window.print(), 200);
}

// ── JSON Backup / Restore ──────────────────────────────────────────────────
function doBackup() {
  const b = new Blob([JSON.stringify({rec:REC,nid:NID,tid:TID},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = 'RCTracker_backup_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}
function doRestore(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.rec) throw new Error();
      if (confirm(`Replace all data with ${d.rec.length} records from backup?`)) {
        REC = d.rec; NID = d.nid||1; TID = d.tid||100; save(); render(); alert('Backup restored.');
      }
    } catch { alert('Could not read backup file.'); }
  };
  reader.readAsText(f); e.target.value = '';
}

// ── Excel Import ───────────────────────────────────────────────────────────
function xlImport(e) {
  const file = e.target.files[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('import') || n.toLowerCase().includes('template')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      let hRow = -1;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (rows[i].map(c=>String(c).toLowerCase()).some(c => c.includes('company') || c.includes('name'))) { hRow=i; break; }
      }
      if (hRow < 0) { alert('Could not find header row. Please use the import template.'); return; }
      const FM = {'type':'type','company':'company','company / location name':'company','location':'company',
        'stage':'stage','priority':'priority','value':'value','email':'contact','phone':'phone','owner':'owner',
        'need / request':'need','need':'need','next step':'nextStep','next step due':'nextDue',
        'install date':'installDate','desired install date':'installDate',
        'hold reason':'holdReason','contact name':'name'};
      const headers = rows[hRow].map(h => String(h).replace(/[★*\s]+$/,'').trim().toLowerCase());
      const parsed = [], errors = [];
      rows.slice(hRow+1).forEach((row, ri) => {
        if (row.every(c => String(c).trim() === '')) return;
        const rec = {};
        headers.forEach((h, ci) => { const f=FM[h]; if(f) rec[f]=String(row[ci]||'').trim(); });
        const rowN = hRow + ri + 2;
        if (!rec.company) { errors.push(`Row ${rowN}: Company missing`); return; }
        rec.type = (rec.type||'').toLowerCase().includes('account') ? 'account' : 'prospect';
        const stages = ['prospect','active','proposal','won','lost','customer','on hold','new request'];
        const ms = stages.find(s => s === (rec.stage||'').toLowerCase());
        rec.stage = ms ? ms.replace(/\b\w/g,c=>c.toUpperCase()) : 'Prospect';
        const pr = (rec.priority||'').toLowerCase();
        rec.priority = pr.startsWith('h')?'High':pr.startsWith('l')?'Low':'Medium';
        ['nextDue','installDate'].forEach(f => {
          if (!rec[f]) { rec[f]=''; return; }
          const mm = rec[f].match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
          const yy = rec[f].match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (mm) rec[f] = `${mm[3]}-${mm[1].padStart(2,'0')}-${mm[2].padStart(2,'0')}`;
          else if (!yy) rec[f] = '';
        });
        parsed.push(rec);
      });
      pendingImport = parsed;
      showImportPreview(parsed, errors, file.name);
    } catch(err) { alert('Error reading file: ' + err.message); }
  };
  reader.readAsArrayBuffer(file); e.target.value = '';
}
function showImportPreview(parsed, errors, fname) {
  const accs = parsed.filter(r=>r.type==='account').length;
  const pros = parsed.filter(r=>r.type==='prospect').length;
  const errHtml = errors.length ? `<div style="margin-top:10px;background:var(--red-s);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--red)"><strong>${errors.length} row(s) skipped:</strong><br>${errors.slice(0,6).join('<br>')}${errors.length>6?`<br>…and ${errors.length-6} more`:''}</div>` : '';
  const prev = parsed.slice(0,5).map(r=>`<tr>
    <td style="padding:5px 8px;font-size:12px;font-weight:600">${r.company}</td>
    <td style="padding:5px 8px"><span class="bdg ${scls(r.stage)}">${r.stage}</span></td>
    <td style="padding:5px 8px"><span class="${r.type==='account'?'b-acc':'b-pro'}">${r.type==='account'?'Account':'Prospect'}</span></td>
    <td style="padding:5px 8px;font-size:11px">${r.nextStep?(r.nextStep.length>40?r.nextStep.substring(0,40)+'…':r.nextStep):'—'}</td>
  </tr>`).join('');
  $('m-import').innerHTML = `
    <div class="mh">Import from Excel</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">File: <strong>${fname}</strong></div>
    <div class="imp4">
      <div class="stat" style="cursor:default"><div class="sn" style="font-size:18px">${parsed.length}</div><div class="sl">To import</div></div>
      <div class="stat" style="cursor:default"><div class="sn" style="font-size:18px">${accs}</div><div class="sl">Accounts</div></div>
      <div class="stat" style="cursor:default"><div class="sn" style="font-size:18px">${pros}</div><div class="sl">Prospects</div></div>
      <div class="stat" style="cursor:default"><div class="sn" style="font-size:18px;color:${errors.length?'var(--red)':'inherit'}">${errors.length}</div><div class="sl">Skipped</div></div>
    </div>
    ${parsed.length?`<div style="border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--surf2)">
          ${['Company','Stage','Type','First Task / Next Step'].map(h=>`<th style="padding:5px 8px;font-size:10px;font-weight:600;text-align:left;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">${h}</th>`).join('')}
        </tr></thead><tbody>${prev}</tbody>
      </table>
      ${parsed.length>5?`<div style="padding:5px 10px;font-size:11px;color:var(--text2);background:var(--surf2);border-top:1px solid var(--bdr)">…and ${parsed.length-5} more records</div>`:''}
    </div>`:'<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">No valid records found.</div>'}
    ${errHtml}
    ${parsed.length?`<div style="margin-top:12px">
      <div class="sec">Import mode</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf2)">
          <input type="radio" name="im" value="add" checked style="margin-top:2px">
          <div><div style="font-size:13px;font-weight:600">Add to existing</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">New records added alongside your ${REC.length} current records.</div></div>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf2)">
          <input type="radio" name="im" value="replace" style="margin-top:2px">
          <div><div style="font-size:13px;font-weight:600;color:var(--red)">Replace all records</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">All ${REC.length} current records deleted and replaced.</div></div>
        </label>
      </div>
    </div>`:''}
    <div class="mfoot">
      <button class="btn" onclick="closeModal('ov-import')">Cancel</button>
      ${parsed.length?`<button class="btn pri" onclick="confirmImport()">Import ${parsed.length} record${parsed.length!==1?'s':''}</button>`:''}
    </div>`;
  showOverlay('ov-import');
}
function confirmImport() {
  const mode = document.querySelector('input[name="im"]:checked')?.value || 'add';
  if (mode === 'replace') {
    if (!confirm(`Delete all ${REC.length} current records and replace? Cannot be undone.`)) return;
    REC = []; NID = 1; TID = 100;
  }
  const imp = pendingImport.map(r => {
    const tasks = [];
    if (r.nextStep) tasks.push({id:tid(), title:r.nextStep, due:r.nextDue||'', done:false});
    return {id:NID++, type:r.type, company:r.company, name:r.name||'', stage:r.stage,
      priority:r.priority, value:r.value||'', contact:r.contact||'', phone:r.phone||'',
      owner:r.owner||'', need:r.need||'', installDate:r.installDate||'',
      holdReason:r.holdReason||'', tasks};
  });
  REC = mode === 'replace' ? imp : [...imp, ...REC];
  save(); closeModal('ov-import'); render();
  alert(`✓ Imported ${imp.length} record${imp.length!==1?'s':''} ${mode==='add'?'— added to existing data.':'— all data replaced.'}`);
}

// ── Sync Setup Modal ───────────────────────────────────────────────────────
function openSyncSetup() {
  const GAS_CODE = `// ═══════════════════════════════════════════════════
// Royal Cup Tracker — Google Apps Script  v2
// Paste into Apps Script, then:
//   Deploy > New Deployment > Web App
//   Execute as: Me
//   Who has access: Anyone
// ═══════════════════════════════════════════════════
const SHEET_NAME = 'TrackerData';

function doGet(e) {
  const action = e.parameter.action || 'get';

  if (action === 'get') {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheet = ss.getSheetByName(SHEET_NAME);
    if (!sheet || sheet.getLastRow() < 1) return jsonOut({rec:[],nid:1,tid:100});
    const val = sheet.getRange(1,1).getValue();
    return jsonOut(val ? JSON.parse(val) : {rec:[],nid:1,tid:100});
  }

  if (action === 'set') {
    const raw = e.parameter.d;
    if (!raw) return jsonOut({error:'no data'});
    const data = JSON.parse(decodeURIComponent(raw));
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sheet = ss.getSheetByName(SHEET_NAME);
    if (!sheet) sheet = ss.insertSheet(SHEET_NAME);
    sheet.getRange(1,1).setValue(JSON.stringify({
      rec: data.rec,
      nid: data.nid,
      tid: data.tid,
      ts:  data.ts
    }));
    return jsonOut({ok:true});
  }

  return jsonOut({error:'unknown action'});
}

function jsonOut(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`;

  $('m-sync').innerHTML = `
    <div class="mh">☁ Google Sheets Sync Setup</div>
    ${syncCfg.scriptUrl ? `<div style="background:var(--grn-s);border:1px solid var(--grn);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--grn-t);margin-bottom:14px">
      ✓ Sync is active. Your tracker is connected to Google Sheets.
      <div style="font-size:11px;margin-top:4px;word-break:break-all;color:var(--grn-t);opacity:.7">${syncCfg.scriptUrl.substring(0,60)}…</div>
    </div>` : `<div style="background:var(--gold-s);border:1px solid var(--gold);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--gold-t);margin-bottom:14px">
      Sync is not configured. Follow the steps below to enable cross-device sync.
    </div>`}

    <div class="sec">Step 1 — Create a Google Sheet</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px">
      Go to <strong>sheets.google.com</strong> and create a new blank spreadsheet. Name it anything — e.g. <em>Royal Cup Tracker</em>.
    </div>

    <div class="sec">Step 2 — Open Apps Script</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px">
      In your Google Sheet, click <strong>Extensions → Apps Script</strong>. Delete any existing code, then paste the script below.
    </div>
    <div style="position:relative;margin-bottom:10px">
      <textarea id="gas-code" readonly style="width:100%;height:160px;font-size:11px;font-family:var(--mono);padding:9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf2);color:var(--text);resize:none;outline:none">${GAS_CODE}</textarea>
      <button class="btn" style="position:absolute;top:7px;right:7px;height:26px;font-size:11px" onclick="navigator.clipboard.writeText($('gas-code').value).then(()=>{this.textContent='✓ Copied';setTimeout(()=>this.textContent='Copy',1500)})">Copy</button>
    </div>

    <div class="sec">Step 3 — Deploy as Web App</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px">
      Click <strong>Deploy → New Deployment</strong>. Set type to <strong>Web app</strong>. Set <em>Execute as</em> to <strong>Me</strong>, and <em>Who has access</em> to <strong>Anyone</strong>. Click Deploy and authorize when prompted. Copy the Web App URL.
    </div>

    <div class="sec">Step 4 — Paste your Web App URL here</div>
    <div class="fr full" style="margin-bottom:0">
      <div><label>Web App URL</label>
        <input id="f-script-url" type="text" placeholder="https://script.google.com/macros/s/…/exec" value="${syncCfg.scriptUrl||''}">
      </div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5">The URL ends in <code>/exec</code>. Keep it private — anyone with it can read/write your data.</div>

    ${syncCfg.scriptUrl ? `
    <div class="sec">Actions</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      <button class="btn" onclick="manualSync()">⟳ Sync now</button>
      <button class="btn danger" onclick="disconnectSync()">Disconnect</button>
    </div>` : ''}

    <div class="mfoot">
      <button class="btn" onclick="closeModal('ov-sync')">Cancel</button>
      <button class="btn pri" onclick="saveSyncUrl()">Save & Connect</button>
    </div>`;
  showOverlay('ov-sync');
}

function saveSyncUrl() {
  const url = ($('f-script-url')?.value || '').trim();
  if (!url) { alert('Please paste your Web App URL.'); return; }
  if (!url.includes('script.google.com')) { if (!confirm('This URL doesn\'t look like a Google Apps Script URL. Continue anyway?')) return; }
  syncCfg.scriptUrl = url;
  saveSyncCfg();
  closeModal('ov-sync');
  updateSyncStatus();
  // Immediately push current data to sheets
  syncQueue.push({ts: Date.now()});
  saveQueue();
  flushQueue().then(() => {
    updateSyncStatus();
    alert('✓ Connected! Your data is now syncing to Google Sheets.');
  });
}

function disconnectSync() {
  if (!confirm('Disconnect Google Sheets sync? Your local data will not be affected.')) return;
  syncCfg = {}; syncQueue = [];
  saveSyncCfg(); saveQueue();
  closeModal('ov-sync'); updateSyncStatus();
}

async function manualSync() {
  closeModal('ov-sync');
  if (!isOnline) { alert('You are offline. Changes will sync when you reconnect.'); return; }
  syncQueue.push({ts: Date.now()});
  saveQueue();
  await flushQueue();
  updateSyncStatus();
  alert('✓ Data pushed to Google Sheets.');
}

// ── Task Export — Excel ────────────────────────────────────────────────────
function exportTasksXL() {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return; }
  const drKey  = $('tk-daterange')?.value || 'all';
  const scope  = $('tk-scope')?.value    || 'all';
  const {start: drStart, end: drEnd} = dateRangeBounds(drKey);
  const wb = XLSX.utils.book_new();

  // Build filtered task rows matching what's on screen
  function collectTasks(doneFilter) {
    const rows = [];
    REC.forEach(r => {
      (r.tasks||[]).forEach(t => {
        if (t.done !== doneFilter) return;
        if (doneFilter) {
          if (drStart) {
            const d = pDate(t.doneDate || t.due);
            if (!d || d < drStart || d > drEnd) return;
          }
        } else {
          if (scope === 'due7')   { const x=dDiff(t.due); if(x===null||x>7||x<0)return; }
          if (scope === 'due30')  { const x=dDiff(t.due); if(x===null||x>30||x<0)return; }
          if (scope === 'over')   { if(dStat(t.due)!=='over')return; }
          if (scope === 'nodate') { if(t.due)return; }
          if (scope === 'install'){ if(!r.installDate)return; }
        }
        rows.push({
          'Company': r.company,
          'Type': r.type==='account'?'Account':'Prospect',
          'Stage': r.stage,
          'Priority': r.priority,
          'Task': t.title,
          'Status': t.done ? 'Completed' : 'Open',
          'Due Date': t.due ? fDate(t.due) : '',
          'Completed Date': t.doneDate ? fDate(t.doneDate) : '',
          'Days Until Due': (!t.done && t.due) ? (dDiff(t.due)??'') : '',
          'Install Date': r.installDate ? fDate(r.installDate) : '',
          'Value': r.value||''
        });
      });
    });
    return rows;
  }

  const openRows = collectTasks(false);
  const doneRows = collectTasks(true);
  const allRows  = [...openRows, ...doneRows].sort((a,b)=>{
    const da=a['Due Date']?new Date(a['Due Date']):null,db=b['Due Date']?new Date(b['Due Date']):null;
    if(da&&db)return da-db; return da?-1:db?1:0;
  });

  const cols = [{wch:26},{wch:10},{wch:13},{wch:10},{wch:45},{wch:10},{wch:14},{wch:14},{wch:13},{wch:14},{wch:12}];

  if (taskTab === 'open' && openRows.length) {
    const ws = XLSX.utils.json_to_sheet(openRows); ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb, ws, 'Open Tasks');
  } else if (taskTab === 'completed' && doneRows.length) {
    const ws = XLSX.utils.json_to_sheet(doneRows); ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb, ws, 'Completed Tasks');
  } else {
    if (openRows.length) { const ws=XLSX.utils.json_to_sheet(openRows); ws['!cols']=cols; XLSX.utils.book_append_sheet(wb,ws,'Open Tasks'); }
    if (doneRows.length) { const ws=XLSX.utils.json_to_sheet(doneRows); ws['!cols']=cols; XLSX.utils.book_append_sheet(wb,ws,'Completed Tasks'); }
  }
  if (!wb.SheetNames.length) { alert('No tasks match the current filter.'); return; }
  XLSX.writeFile(wb, 'RoyalCup_Tasks_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

// ── Task Export — PDF (print) ───────────────────────────────────────────────
function exportTasksPDF() {
  const drKey  = $('tk-daterange')?.value || 'all';
  const scope  = $('tk-scope')?.value    || 'all';
  const {start: drStart, end: drEnd} = dateRangeBounds(drKey);
  const now = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const tabLabel = taskTab === 'completed' ? 'Completed Tasks' : 'Open Tasks';
  const rangeLabel = taskTab === 'completed' && drKey !== 'all'
    ? ` · ${$('tk-daterange').options[$('tk-daterange').selectedIndex].text}`
    : '';

  let items = [];
  REC.forEach(r => {
    (r.tasks||[]).forEach(t => {
      if (taskTab === 'completed') {
        if (!t.done) return;
        if (drStart) { const d=pDate(t.doneDate||t.due); if(!d||d<drStart||d>drEnd)return; }
      } else {
        if (t.done) return;
        if (scope==='due7')  { const x=dDiff(t.due); if(x===null||x>7||x<0)return; }
        if (scope==='due30') { const x=dDiff(t.due); if(x===null||x>30||x<0)return; }
        if (scope==='over')  { if(dStat(t.due)!=='over')return; }
        if (scope==='nodate'){ if(t.due)return; }
        if (scope==='install'){if(!r.installDate)return; }
      }
      items.push({r,t});
    });
  });

  if (!items.length) { alert('No tasks match the current filter.'); return; }

  const thead = `<thead><tr>
    <th style="width:18%">Company</th><th style="width:9%">Stage</th>
    <th style="width:8%">Priority</th><th style="width:28%">Task</th>
    <th style="width:11%">Due Date</th><th style="width:11%">Completed</th>
    <th style="width:15%">Install Date</th>
  </tr></thead>`;

  const rows = items.map(({r,t}) => {
    const ds = dStat(t.due);
    const dueCls = ds==='over'?'color:#B83030':ds==='soon'?'color:#9A6B00':'';
    return `<tr>
      <td style="font-weight:600">${r.company}<br><span style="font-size:9px;color:#666">${r.type==='account'?'Account':'Prospect'}</span></td>
      <td><span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:${sbg(r.stage)};color:${sfg(r.stage)}">${r.stage}</span></td>
      <td style="font-size:10px;font-weight:700;color:${r.priority==='High'?'#B83030':r.priority==='Medium'?'#9A6B00':'#1A7A52'}">${r.priority}</td>
      <td style="font-size:10px;${t.done?'text-decoration:line-through;color:#999':''}">${t.title}</td>
      <td style="font-size:10px;white-space:nowrap;${dueCls}">${t.due?fDate(t.due):'—'}</td>
      <td style="font-size:10px;white-space:nowrap;color:#1A7A52">${t.doneDate?fDate(t.doneDate):t.done?'Yes':'—'}</td>
      <td style="font-size:10px;white-space:nowrap">${r.installDate?fDate(r.installDate):'—'}</td>
    </tr>`;
  }).join('');

  $('print-area').innerHTML = `
    <div class="rph">Royal Cup — ${tabLabel}${rangeLabel}</div>
    <div class="rps">Generated ${now} · ${items.length} task${items.length!==1?'s':''}</div>
    <table class="pt">${thead}<tbody>${rows}</tbody></table>`;
  setTimeout(() => window.print(), 200);
}

// ── PDF Snapshot for a single record ───────────────────────────────────────
function printRecordPDF(id) {
  const r = REC.find(x => x.id === id); if (!r) return;
  const isA = r.type === 'account';
  const now = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const openT  = (r.tasks||[]).filter(t=>!t.done);
  const doneT  = (r.tasks||[]).filter(t=>t.done);

  function taskRows(tasks, showDone) {
    if (!tasks.length) return `<tr><td colspan="3" style="color:#999;font-style:italic;font-size:10px;padding:5px 7px">None</td></tr>`;
    return tasks.map(t => {
      const ds = dStat(t.due);
      const dueCls = showDone ? 'color:#1A7A52' : (ds==='over'?'color:#B83030':ds==='soon'?'color:#9A6B00':'');
      return `<tr>
        <td style="font-size:10px;padding:4px 7px;${showDone?'text-decoration:line-through;color:#999':''}">${t.title}</td>
        <td style="font-size:10px;padding:4px 7px;white-space:nowrap;${dueCls}">${t.due?fDate(t.due):'—'}</td>
        <td style="font-size:10px;padding:4px 7px;white-space:nowrap;color:#1A7A52">${t.doneDate?fDate(t.doneDate):showDone?'✓':''}</td>
      </tr>`;
    }).join('');
  }

  const iDiff = dDiff(r.installDate);
  const iDs   = dStat(r.installDate);

  $('print-area').innerHTML = `
    <div class="rph">${r.company}</div>
    <div class="rps">
      PDF Snapshot · Generated ${now}
      &nbsp;·&nbsp; ${isA?'My Account':'Prospect'}
      &nbsp;·&nbsp; Stage: ${r.stage}
      &nbsp;·&nbsp; Priority: ${r.priority}
      ${r.value ? '&nbsp;·&nbsp; Value: '+r.value : ''}
    </div>

    <table class="pt" style="margin-bottom:10px">
      <thead><tr>
        <th style="width:20%">Field</th><th>Details</th>
      </tr></thead>
      <tbody>
        ${r.need?`<tr><td style="font-weight:600">Need / Request</td><td>${r.need}</td></tr>`:''}
        ${r.type==='prospect'&&r.prospectStep?`<tr><td style="font-weight:600">Prospect Step</td><td>${r.prospectStep}</td></tr>`:''}
        ${r.installDate?`<tr><td style="font-weight:600">Install Date</td><td>${fDate(r.installDate)}${iDiff!==null?' ('+Math.abs(iDiff)+'d '+(iDiff<0?'overdue':'away')+')':''}</td></tr>`:''}
        ${r.holdReason?`<tr><td style="font-weight:600">Hold Reason</td><td>${r.holdReason}</td></tr>`:''}
        ${r.name?`<tr><td style="font-weight:600">Contact</td><td>${r.name}${r.contact?' — '+r.contact:''}${r.phone?' — '+r.phone:''}</td></tr>`:''}
        ${r.owner?`<tr><td style="font-weight:600">Owner</td><td>${r.owner}</td></tr>`:''}
      </tbody>
    </table>

    <div class="rpg">Open Tasks (${openT.length})</div>
    <table class="pt" style="margin-bottom:10px">
      <thead><tr>
        <th style="width:60%">Task</th><th style="width:20%">Due Date</th><th style="width:20%">Completed</th>
      </tr></thead>
      <tbody>${taskRows(openT, false)}</tbody>
    </table>

    <div class="rpg">Completed Tasks (${doneT.length})</div>
    <table class="pt">
      <thead><tr>
        <th style="width:60%">Task</th><th style="width:20%">Due Date</th><th style="width:20%">Completed</th>
      </tr></thead>
      <tbody>${taskRows(doneT, true)}</tbody>
    </table>`;

  closeModal('ov-main');
  setTimeout(() => window.print(), 200);
}

// ── Modal helpers ──────────────────────────────────────────────────────────
function showOverlay(id) { $(id).classList.add('show'); }
function closeModal(id)  { $(id).classList.remove('show'); }
function bgClose(e, id)  { if (e.target === $(id)) closeModal(id); }

// ── Init ───────────────────────────────────────────────────────────────────
load();
render();
updateSyncStatus();
// After local render, try to pull latest from Sheets in background
loadFromSheets();
// Re-try flush every 30s in case of intermittent connectivity
setInterval(() => { if (syncQueue.length && isOnline) flushQueue(); }, 30000);
</script>
