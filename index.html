<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Royal Cup">
<meta name="theme-color" content="#1B2A4A">
<title>Royal Cup — Sales Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* HIGH-CONTRAST LIGHT THEME */
  --bg:#F2F2F4;              /* soft warm-grey page — just enough tint */
  --surf:#FFFFFF;            /* cards/panels stay pure white so they pop */
  --surf2:#EAEAEE;           /* subtle grey hover/hint */
  --surf3:#DCDCE2;           /* slightly stronger grey */
  --text:#0A0A0A;            /* near-black primary text */
  --text2:#3C3C43;           /* secondary text, still very dark */
  --text3:#6B6B72;           /* tertiary / helper — darkened from before for contrast */
  --bdr:#C8C8CE;             /* visible borders */
  --bdr2:#8E8E93;            /* hover borders, strong contrast */
  --navy:#1B2A4A;            /* primary brand blue — kept */
  --gold:#C9A84C;            /* gold accent — kept for compatibility */
  --gold-s:#FDF5DC;          /* soft gold bg (amber-warn) */
  --gold-t:#6B4E00;          /* dark gold text for strong contrast on light bg */
  --r:8px;--rl:12px;--rxl:16px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  /* Status colors — higher contrast versions */
  --grn:#0E7A3D;             /* stronger green */
  --grn-s:#DCFAE6;           /* soft green bg */
  --grn-t:#0B5C2E;           /* deep green text */
  --amb:#B87400;             /* darker amber for contrast */
  --amb-s:#FFF4DC;           /* soft amber bg */
  --amb-t:#6B4400;           /* deep amber text */
  --red:#C8102E;             /* stronger red */
  --red-s:#FFE4E6;           /* soft red bg */
  --red-t:#7F0A1C;           /* deep red text */
  --grys:#E5E5EA;--gryt:#2C2C2E;
  --tel-s:#DCFAE6;--tel-t:#0B5C2E;
  --shd:0 1px 2px rgba(0,0,0,.06),0 1px 1px rgba(0,0,0,.04);
  --shd-md:0 4px 10px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.06);
}

/* DARK THEME */
html[data-theme="dark"] {
  --bg:#0A0A0A;              /* near-black page */
  --surf:#1A1A1C;            /* cards/panels */
  --surf2:#25252A;           /* hover */
  --surf3:#3A3A40;           /* borders-as-fill */
  --text:#FAFAFA;            /* near-white */
  --text2:#D0D0D5;           /* light secondary */
  --text3:#9A9AA0;           /* helper */
  --bdr:#3A3A40;
  --bdr2:#5A5A62;
  --navy:#5B87D4;            /* bright blue for dark bg (was too dark) */
  --gold:#E0C060;
  --gold-s:#3A2E0A;
  --gold-t:#F5DE80;
  --grn:#35C077;
  --grn-s:#0D3820;
  --grn-t:#7DE4A8;
  --amb:#F0A830;
  --amb-s:#3A2600;
  --amb-t:#FFD080;
  --red:#F25065;
  --red-s:#3A0F1A;
  --red-t:#FF8090;
  --grys:#3A3A40;--gryt:#D0D0D5;
  --tel-s:#0D3820;--tel-t:#7DE4A8;
  --shd:0 1px 2px rgba(0,0,0,.35),0 1px 1px rgba(0,0,0,.25);
  --shd-md:0 4px 14px rgba(0,0,0,.45),0 2px 4px rgba(0,0,0,.3);
}

/* Smooth theme transitions */
body, .card, .modal, .stat, .vbtn, .btn, .md-section, .dbox,
.children-section, .agg-card, .more-pop, input, select, textarea {
  transition: background-color .2s ease, color .2s ease, border-color .2s ease;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
body::before{content:'';display:block;height:3px;background:var(--navy);position:sticky;top:0;z-index:999}
.app{max-width:1460px;margin:0 auto;padding:14px 18px}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--navy)}
.hdr .sv{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.hdr-r{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{height:32px;padding:0 13px;font-size:13px;font-weight:500;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);cursor:pointer;font-family:var(--font);white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:background .15s,border-color .15s}
.btn:hover{background:var(--surf2);border-color:var(--bdr2)}
.btn.pri{background:var(--navy);color:#fff;border-color:var(--navy)}.btn.pri:hover{opacity:.87}
.btn.grn{background:var(--grn);color:#fff;border-color:var(--grn)}.btn.grn:hover{opacity:.87}
.btn.amb{background:var(--gold);color:#1B2A4A;border-color:var(--gold)}.btn.amb:hover{opacity:.87}
.btn.imp{background:var(--gold-s);color:var(--gold-t);border-color:var(--gold)}.btn.imp:hover{background:var(--gold);color:#1B2A4A}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,max-content);gap:10px;margin-bottom:14px;justify-content:start}
.stat{min-width:140px}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 12px;box-shadow:var(--shd);cursor:pointer;transition:all .15s}
.stat:hover{border-color:var(--bdr2)}
.stat.on{border-color:var(--navy);background:var(--navy)}
.stat.on .sn,.stat.on .sl{color:#fff}
.sn{font-size:20px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.sl{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}

/* View bar */
.vbar{display:flex;gap:0;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;width:fit-content;box-shadow:var(--shd)}
.vbtn{padding:7px 15px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surf);color:var(--text2);border:none;border-right:1px solid var(--bdr);font-family:var(--font);display:flex;align-items:center;gap:5px;transition:background .15s,color .15s;white-space:nowrap}
.vbtn:last-child{border-right:none}
.vbtn:hover{background:var(--surf2)}
.vbtn.on{background:var(--navy);color:#fff}

/* Toolbar */
.tbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tbar input[type=text],.tbar select{height:32px;font-size:13px;padding:0 10px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.tbar input[type=text]{flex:1;min-width:150px}
.tbar input:focus,.tbar select:focus{border-color:var(--bdr2)}

/* Filter tabs */
.ftabs{display:flex;gap:3px;flex-wrap:wrap;margin:8px 0}
.ftab{padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;border-radius:20px;color:var(--text2);background:none;font-family:var(--font);transition:all .15s}
.ftab:hover{background:var(--surf);border-color:var(--bdr)}
.ftab.on{background:var(--surf);border-color:var(--bdr2);color:var(--text);box-shadow:var(--shd)}

/* Badges */
.bdg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
.b-prospect{background:#E8EDF5;color:#1B2A4A}
.b-active{background:var(--grn-s);color:var(--grn-t)}
.b-proposal{background:var(--gold-s);color:var(--gold-t)}
.b-won{background:var(--tel-s);color:var(--tel-t)}
.b-lost{background:var(--red-s);color:var(--red-t)}
.b-customer{background:#E8EDF5;color:#1B2A4A}
.b-on-hold{background:var(--grys);color:var(--gryt)}
.b-new-request{background:var(--gold-s);color:var(--gold-t)}
.b-acc{background:#E8EDF5;color:#1B2A4A;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:600}
.b-pro{background:var(--gold-s);color:var(--gold-t);font-size:9px;padding:1px 6px;border-radius:20px;font-weight:600}
.p-hi{color:var(--red);font-weight:600}
.p-md{color:#9A6B00;font-weight:600}
.p-lo{color:var(--grn);font-weight:600}
.due-ok{background:var(--grn-s);color:var(--grn-t)}
.due-soon{background:var(--amb-s);color:var(--amb-t)}
.due-over{background:var(--red-s);color:var(--red-t)}
.dpill{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
/* P1/P2/P3 priority pills */
.ppill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block;letter-spacing:.03em}
.p1{background:#FAE8E8;color:#741C1C;border:1px solid #B83030}
.p2{background:#FBF4E0;color:#7A5E10;border:1px solid #C9A84C}
.p3{background:#EDE5D8;color:#3D2E1E;border:1px solid #9B8F82}
.pn{background:#F8F5EE;color:#9B8F82;border:1px dashed #C4B89E}
/* Project view */
.b-prj{background:#E8EDF5;color:#1B2A4A;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:600}
/* Multi-contact cards */
.contact-card{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-top:8px}
.contact-card .cc-head{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:6px}
.contact-card .cc-name{font-weight:600;font-size:13px}
.contact-card .cc-pos{font-size:11px;color:var(--text2);font-style:italic}
.contact-card .cc-row{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-top:4px}
.contact-card .cc-notes{font-size:12px;margin-top:6px;color:var(--text);white-space:pre-wrap;line-height:1.5}
.contact-card button.cc-del{width:22px;height:22px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;border-radius:4px}
.contact-card button.cc-del:hover{background:var(--red-s);color:var(--red)}
/* Action plan entries */
.ap-section{border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-top:10px;background:var(--surf)}
.ap-section .ap-shdr{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.ap-section .ap-stitle{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--navy)}
.ap-section .ap-scnt{font-size:11px;color:var(--text3);background:var(--surf2);padding:1px 7px;border-radius:20px}
.ap-entry{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 10px;margin-top:6px}
.ap-entry .ape-head{display:flex;justify-content:space-between;gap:6px;align-items:flex-start;margin-bottom:4px}
.ap-entry .ape-title{font-weight:600;font-size:12px;flex:1;min-width:0}
.ap-entry .ape-date{font-size:10px;color:var(--text3)}
.ap-entry .ape-body{font-size:12px;white-space:pre-wrap;line-height:1.5;color:var(--text)}
.ap-entry button.ape-del{width:20px;height:20px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;border-radius:4px;flex-shrink:0}
.ap-entry button.ape-del:hover{background:var(--red-s);color:var(--red)}
.ap-add{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ap-add input[type=text]{flex:1;min-width:140px;height:30px;font-size:12px;padding:0 8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font)}
.ap-add textarea{width:100%;min-height:60px;font-size:12px;padding:7px 9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none;margin-top:6px}
.ap-add .abtn{height:30px;padding:0 12px;font-size:12px;font-weight:600;border:1px solid var(--navy);border-radius:var(--r);background:var(--navy);color:#fff;cursor:pointer;white-space:nowrap;font-family:var(--font)}
.ap-add .abtn:hover{opacity:.85}

/* Parent/Child chain indicators */
.b-parent{background:#1B2A4A;color:#fff;font-size:9px;padding:1px 7px;border-radius:20px;font-weight:600;letter-spacing:.03em}
.b-child{background:#E8EDF5;color:#1B2A4A;font-size:9px;padding:1px 7px;border-radius:20px;font-weight:600;border:1px solid #5C7BBF}
.card.is-parent{border-left:3px solid #1B2A4A;border-top:1px solid #1B2A4A}
.card.is-child{border-left:3px dashed #5C7BBF}
.kb-card.is-parent{border-left:2px solid #1B2A4A}
.kb-card.is-child{border-left:2px dashed #5C7BBF}
.parent-link{font-size:11px;color:#5C7BBF;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.parent-link:hover{text-decoration:underline}
/* Children list inside a parent's detail view */
.children-section{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:10px}
.child-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);margin-top:6px;cursor:pointer;transition:border-color .15s,box-shadow .12s}
.child-row:hover{border-color:#5C7BBF;box-shadow:0 1px 3px rgba(92,123,191,.15)}
.child-co{font-weight:600;font-size:13px;flex:1;min-width:0}
.child-meta{font-size:11px;color:var(--text2);margin-top:1px}
.child-stats{display:flex;gap:6px;font-size:11px;align-items:center;flex-shrink:0}
.aggregate-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-top:8px}
.agg-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:7px 9px;text-align:center}
.agg-n{font-size:18px;font-weight:600;color:var(--navy)}
.agg-l{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);font-weight:500;margin-top:1px}

.card.is-prj{border-left:3px solid #5C7BBF}
.kb-card.is-prj{border-left:2px solid #5C7BBF}
/* My Day cards */
.md-section{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;box-shadow:var(--shd);margin-bottom:12px}
.md-shdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--bdr)}
.md-sdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.md-stitle{font-size:13px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.md-scnt{font-size:11px;font-weight:600;background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:1px 8px;color:var(--text2);margin-left:auto}
.md-empty{padding:10px 4px;color:var(--text3);font-size:12px;font-style:italic;text-align:center}
.md-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);transition:background .12s;cursor:pointer}
.md-row:hover{background:var(--surf2)}
.md-row+.md-row{border-top:1px solid #F0EBE2}
.md-task{flex:1;font-size:12px;line-height:1.4}
.md-co{font-size:11px;color:var(--text2);margin-top:1px}
.md-cb{accent-color:var(--navy);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.md-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.md-grid{grid-template-columns:1fr}}
/* Status pills for projects */
.st-ns{background:var(--surf3);color:var(--gryt);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.st-ip{background:var(--gold-s);color:var(--gold-t);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.st-co{background:var(--grn-s);color:var(--grn-t);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}


/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rl);padding:13px 15px;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:var(--shd)}
.card:hover{border-color:var(--bdr2);box-shadow:var(--shd-md)}
.card.is-acc{border-left:3px solid var(--navy)}
.card.is-pro{border-left:3px solid var(--gold)}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.c-name{font-size:15px;font-weight:600;letter-spacing:-.2px;line-height:1.3}
.c-sub{font-size:11px;color:var(--text2);margin-top:2px}
.c-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;margin-left:8px}
.c-row{display:flex;align-items:baseline;gap:6px;font-size:12px;margin-top:5px}
.c-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);min-width:44px;flex-shrink:0}
.c-val{color:var(--text);flex:1}
.next-box{background:var(--surf2);border-radius:var(--r);padding:7px 9px;margin-top:7px;border-left:2px solid var(--gold)}
.next-row{display:flex;justify-content:space-between;align-items:flex-start;gap:5px}
.next-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);white-space:nowrap;flex-shrink:0;padding-top:1px}
.next-txt{font-size:12px;color:var(--text);line-height:1.45;flex:1;margin:0 5px}
.more-tasks{font-size:10px;color:var(--text3);margin-top:3px}
.hold-box{background:var(--grys);border-radius:var(--r);padding:5px 9px;margin-top:5px;font-size:11px;color:var(--gryt)}
.inst-row{display:flex;align-items:center;gap:5px;font-size:11px;margin-top:5px}
.inst-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.c-foot{display:flex;gap:8px;font-size:11px;color:var(--text2);margin-top:8px;padding-top:7px;border-top:1px solid var(--bdr);flex-wrap:wrap;align-items:center}
.empty-msg{text-align:center;padding:3rem;color:var(--text3);font-size:14px}

/* ── KANBAN ── */
.kb-wrap{overflow-x:auto;padding-bottom:10px}
.kb-board{display:flex;gap:10px;min-width:max-content;align-items:flex-start}
.kb-col{width:230px;flex-shrink:0;background:var(--surf2);border-radius:var(--rl);border:1px solid var(--bdr);overflow:hidden}
.kb-hdr{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.kb-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.kb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kb-cnt{font-size:10px;font-weight:600;background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:1px 7px;color:var(--text2)}
.kb-cards{padding:7px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.kb-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 11px;cursor:pointer;box-shadow:var(--shd);transition:border-color .15s,box-shadow .15s}
.kb-card:hover{border-color:var(--bdr2);box-shadow:var(--shd-md)}
.kb-card.is-acc{border-left:2px solid var(--navy)}
.kb-card.is-pro{border-left:2px solid var(--gold)}
.kb-name{font-size:13px;font-weight:600;margin-bottom:3px}
.kb-val{font-size:11px;color:var(--text2);margin-bottom:4px}
.kb-next{font-size:11px;color:var(--text);background:var(--surf2);border-radius:5px;padding:4px 7px;border-left:2px solid var(--gold);line-height:1.4;margin-bottom:5px}
.kb-foot{display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}
.kb-empty{font-size:11px;color:var(--text3);text-align:center;padding:14px 8px;font-style:italic}

/* ── TABLE ── */
.tbl-opts{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--text2)}
.tbl-opts label{display:flex;align-items:center;gap:4px;cursor:pointer;font-weight:500}
.tbl-wrap{overflow:auto;border:1px solid var(--bdr);border-radius:var(--rl);background:var(--surf);box-shadow:var(--shd)}
table.ct{width:100%;border-collapse:collapse;font-size:13px}
table.ct thead{position:sticky;top:0;z-index:10}
table.ct th{background:var(--surf2);color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 11px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none}
table.ct th:hover{background:var(--surf3);color:var(--text)}
table.ct th.sa::after{content:' ↑';color:var(--navy)}
table.ct th.sd::after{content:' ↓';color:var(--navy)}
table.ct td{padding:8px 11px;border-bottom:1px solid var(--bdr);vertical-align:middle}
table.ct tbody tr:last-child td{border-bottom:none}
table.ct tbody tr:hover td{background:var(--surf2);cursor:pointer}
table.ct tbody tr.r-acc td:first-child{border-left:3px solid var(--navy)}
table.ct tbody tr.r-pro td:first-child{border-left:3px solid var(--gold)}
.t-name{font-weight:600;font-size:13px}
.t-sub{font-size:11px;color:var(--text2);margin-top:1px}
.t-clip{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.t-act{text-align:right;white-space:nowrap}
.tsbtn{padding:3px 8px;font-size:11px;font-weight:500;border:1px solid var(--bdr);border-radius:5px;background:var(--surf);color:var(--text2);cursor:pointer;font-family:var(--font);margin-left:3px}
.tsbtn:hover{background:var(--surf2);color:var(--text)}
.tsbtn.del{color:var(--red);border-color:#f5c0c0}.tsbtn.del:hover{background:var(--red-s)}
tr.exp-row td{background:var(--surf2)!important;cursor:default!important;padding:10px 14px;font-size:12px;border-bottom:1px solid var(--bdr)}
.exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:8px}
.ef label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);display:block;margin-bottom:2px}
.ef p{font-size:12px;color:var(--text);line-height:1.5}

/* ── TASK LIST ── */
.tk-opts{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tk-opts select{height:32px;font-size:13px;padding:0 9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.tk-opts .hint{font-size:11px;color:var(--text3);margin-left:4px}
.tk-wrap{border:1px solid var(--bdr);border-radius:var(--rl);background:var(--surf);box-shadow:var(--shd);overflow:hidden}
table.tkt{width:100%;border-collapse:collapse;font-size:13px}
table.tkt thead{position:sticky;top:0;z-index:10}
table.tkt th{background:var(--surf2);color:var(--text2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:2px solid var(--bdr);white-space:nowrap;cursor:pointer;user-select:none}
table.tkt th:hover{background:var(--surf3)}
table.tkt th.sa::after{content:' ↑';color:var(--navy)}
table.tkt th.sd::after{content:' ↓';color:var(--navy)}
table.tkt td{padding:9px 12px;border-bottom:1px solid var(--bdr);vertical-align:top}
table.tkt tbody tr:last-child td{border-bottom:none}
table.tkt tbody tr:hover td{background:var(--surf2);cursor:pointer}
.tk-over td{background:#fff8f8}
.tk-soon td{background:#fffcf0}
.tk-grp td{background:var(--surf3)!important;cursor:default!important;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:5px 12px;border-bottom:1px solid var(--bdr)}
.tk-cnt{font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;margin-left:8px;background:var(--surf);color:var(--text2);border:1px solid var(--bdr)}
.tk-co{font-weight:600;font-size:13px}
.tk-type{font-size:10px;margin-top:2px}
.tk-title{font-size:13px;color:var(--text);line-height:1.5}
.tk-due-big{font-size:13px;font-weight:600}
.tk-due-rel{font-size:11px;color:var(--text2);margin-top:2px}
.tk-empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(18,18,16,.42);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.modal{background:var(--surf);border-radius:var(--rxl);border:1px solid var(--bdr);padding:22px 22px 0;width:min(570px,96vw);max-height:92vh;overflow-y:auto;box-shadow:var(--shd-md)}
/* Footer always sticks to the bottom of the visible modal area,
   regardless of content length. */
.modal > .mfoot{position:sticky;bottom:0;background:var(--surf);margin:16px -22px 0;padding:12px 22px 18px;border-top:1px solid var(--bdr);z-index:2}
.mh{font-size:16px;font-weight:600;letter-spacing:-.2px;margin-bottom:16px}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--bdr)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fr.full{grid-template-columns:1fr}
.fr.tri{grid-template-columns:1fr 1fr 1fr}
.fr label{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;font-weight:500}
.fr label .opt{font-style:italic;color:var(--text3);font-weight:400}
.fr input,.fr select,.fr textarea{width:100%;height:32px;font-size:13px;padding:0 9px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--bdr2)}
.fr input[type=date]{padding:0 7px}
.fr textarea{height:62px;padding:7px 9px;resize:vertical}
.type-toggle{display:flex;gap:6px;margin-bottom:10px}
.tpbtn{padding:6px 13px;font-size:13px;border:1px solid var(--bdr);border-radius:20px;cursor:pointer;background:var(--surf);color:var(--text2);font-family:var(--font);font-weight:500;transition:all .15s}
.tpbtn.pro{background:var(--gold-s);color:var(--gold-t);border-color:var(--gold)}
.tpbtn.acc{background:#E8EDF5;color:var(--navy);border-color:var(--navy)}
.ctog{display:flex;align-items:center;gap:8px;margin:10px 0 4px;cursor:pointer;user-select:none;font-size:12px;color:var(--text2);font-weight:500}
.ctog input{cursor:pointer;accent-color:var(--navy)}
.csec{display:none}
.csec.show{display:block}
.mfoot{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
/* Detail modal */
.dl{font-size:10px;color:var(--text2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.dv{font-size:13px;color:var(--text);line-height:1.5}
.d2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.dbox{background:var(--surf2);border-radius:var(--r);padding:9px 11px;margin-bottom:9px}
.dbox.gold{border-left:3px solid var(--gold)}
.dbox.navy{border-left:3px solid var(--navy)}
.dbox.hold{background:var(--grys);border-left:3px solid #999}
/* Task UI inside detail */
.task-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.task-hdr-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.show-done{font-size:11px;color:var(--text3);cursor:pointer;font-weight:500}
.show-done:hover{color:var(--text2)}
.task-list{display:flex;flex-direction:column;gap:5px}
.titem{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);font-size:12px}
.titem.done{opacity:.5}
.titem input[type=checkbox]{accent-color:var(--navy);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.titem .tt{flex:1;color:var(--text);line-height:1.4}
.titem.done .tt{text-decoration:line-through;color:var(--text3)}
.titem .tdp{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.tdel{width:20px;height:20px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:0}
.tdel:hover{background:var(--red-s);color:var(--red)}
.add-task{display:flex;gap:6px;margin-top:8px;align-items:center}
.add-task input[type=text]{flex:1;height:30px;font-size:12px;padding:0 8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.add-task input[type=text]:focus{border-color:var(--bdr2)}
.add-task input[type=date]{height:30px;font-size:12px;padding:0 6px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none}
.add-task input[type=date]:focus{border-color:var(--bdr2)}
.add-task .abtn{height:30px;padding:0 12px;font-size:12px;font-weight:600;border:1px solid var(--gold);border-radius:var(--r);background:var(--gold-s);color:var(--gold-t);cursor:pointer;white-space:nowrap;font-family:var(--font)}
.add-task .abtn:hover{background:var(--gold);color:#1B2A4A}
/* PDF modal */
.prow{display:flex;gap:10px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.prow label{font-size:13px;color:var(--text2);font-weight:500;min-width:68px}
.prow select{height:31px;font-size:13px;padding:0 8px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font)}
.notebox{background:var(--surf2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6}
/* Import preview */
.imp4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
/* ═══════════════════════════════════════════════════════════════════════
   MOBILE / TABLET RESPONSIVE STYLES
   Phone breakpoint: 640px and below
   Tablet breakpoint: 641px – 1024px
   ═══════════════════════════════════════════════════════════════════════ */

/* Make date inputs look better on mobile (native picker) */
input[type=date], input[type=number], input[type=text], select, textarea {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  background-image: none;
}
/* Keep the dropdown arrow on selects */
select {
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235C5246' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 14px;
  padding-right: 28px;
}

/* Header: "More" menu for secondary actions (all devices) */
.more-menu {
  position: relative;
  display: inline-block;
}
.more-menu.show .more-pop {
  display: flex;
}
.more-pop {
  display: none;
  position: absolute;
  right: 0; top: calc(100% + 4px);
  z-index: 200;
  background: var(--surf);
  border: 1px solid var(--bdr);
  border-radius: var(--rl);
  box-shadow: var(--shd-md);
  flex-direction: column;
  min-width: 180px;
  padding: 6px;
}
.more-pop button {
  text-align: left;
  justify-content: flex-start;
  border: none;
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  background: transparent;
  border-radius: var(--r);
}
.more-pop button:hover {
  background: var(--surf2);
}
/* Always hide the individual action buttons — they live in the ⋯ More menu */
.hdr-r .btn.mobile-hide { display: none !important; }

/* ── TABLET / SPLIT-SCREEN (641px–1024px) ────────────────────────────
   Covers iPad portrait/landscape, Surface laptops at half-screen,
   and any browser window between ~640 and 1024 pixels wide. */
@media (min-width: 641px) and (max-width: 1024px) {
  .app { padding: 12px 14px; }
  body { font-size: 15px; }
  .hdr h1 { font-size: 20px; }
  .btn { height: 38px; font-size: 14px; padding: 0 14px; }
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .sn { font-size: 22px; }
  .vbtn { padding: 9px 16px; font-size: 14px; }
  /* Modal narrows proportionally to the viewport */
  .modal { width: min(680px, 94vw); max-height: 90vh; padding: 20px 20px 0; }
  .modal > .mfoot{margin:16px -20px 0;padding:12px 20px 16px}
  .mh { font-size: 18px; }
  /* Form rows: keep 2 columns but allow wrapping */
  .fr, .fr.tri { gap: 10px; }
  /* Modal footer: smaller buttons, wrap if needed */
  .mfoot { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .mfoot .btn { height: 36px; font-size: 13px; padding: 0 12px; flex: 0 1 auto; }
  /* Task row: keep items on one line */
  .titem { flex-wrap: wrap; }
  .add-task { flex-wrap: wrap; }
  .add-task input[type=text] { min-width: 130px; }
  /* Detail view header: allow wrapping */
  .d2 { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
}

/* ── MOBILE (iPhone portrait) — main readability pass ────────────── */
@media (max-width: 640px) {
  body { font-size: 16px; line-height: 1.5; -webkit-text-size-adjust: 100%; }
  .app { padding: 10px 12px; max-width: 100%; }

  /* Header — cleaner, app-like */
  .hdr { flex-direction: column; align-items: stretch; gap: 10px; margin-bottom: 12px; }
  .hdr h1 { font-size: 20px; letter-spacing: -.4px; }
  .hdr .sv { font-size: 11px; }
  .hdr-r { justify-content: flex-end; gap: 8px; }

  /* All buttons — Apple's 44px minimum tap target */
  .btn { height: 44px; font-size: 15px; padding: 0 16px; font-weight: 500; }
  .btn.pri, .btn.amb, .btn.grn { font-weight: 600; }

  /* Stats: 2 equal columns on mobile, larger numbers */
  .stats { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat { padding: 12px 14px; border-radius: var(--rl); min-width: 0; }
  .sn { font-size: 24px; letter-spacing: -.5px; }
  .sl { font-size: 10.5px; margin-top: 3px; }

  /* View bar: horizontal scroll with momentum */
  .vbar {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: var(--rl);
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
  }
  .vbar::-webkit-scrollbar { display: none; }
  .vbtn {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    min-width: max-content;
    scroll-snap-align: start;
    flex-shrink: 0;
  }

  /* Toolbar — stacks on mobile, bigger inputs */
  .tbar { flex-direction: column; align-items: stretch; gap: 8px; }
  .tbar input[type=text], .tbar select {
    height: 44px; font-size: 15px; padding: 0 12px; width: 100%;
  }

  /* Filter tabs: easier to tap */
  .ftabs { gap: 6px; margin: 10px 0; }
  .ftab { padding: 8px 14px; font-size: 13px; font-weight: 600; }

  /* ═════ CARDS: big readable layout ═════ */
  .cards-grid { grid-template-columns: 1fr; gap: 10px; }
  .card {
    padding: 16px 18px;
    border-radius: var(--rl);
    box-shadow: var(--shd-md);
    border-left-width: 4px;
  }
  .c-top { margin-bottom: 12px; }
  .c-name { font-size: 17px; line-height: 1.3; font-weight: 600; }
  .c-sub { font-size: 13px; margin-top: 3px; }
  .c-badges { gap: 5px; }
  .bdg { font-size: 11px; padding: 3px 10px; font-weight: 600; }
  .b-acc, .b-pro, .b-parent, .b-child, .b-prj { font-size: 10px; padding: 2px 8px; }
  .c-row { font-size: 14px; margin-top: 7px; line-height: 1.4; }
  .c-lbl { font-size: 11px; min-width: 50px; letter-spacing: .05em; }
  .c-val { line-height: 1.4; }
  .next-box { padding: 10px 12px; margin-top: 10px; border-radius: var(--r); }
  .next-lbl { font-size: 11px; }
  .next-txt { font-size: 14px; line-height: 1.5; margin: 0 6px; }
  .more-tasks { font-size: 11px; margin-top: 5px; }
  .inst-row { font-size: 13px; margin-top: 8px; }
  .c-foot {
    font-size: 13px; margin-top: 12px; padding-top: 10px; gap: 10px;
  }
  .dpill { font-size: 11px; padding: 3px 9px; font-weight: 600; }
  .ppill { font-size: 11px; padding: 3px 10px; }

  /* ═════ My Day view: breathable on mobile ═════ */
  .md-section { padding: 14px 16px; border-radius: var(--rl); margin-bottom: 14px; }
  .md-shdr { margin-bottom: 12px; padding-bottom: 10px; gap: 10px; }
  .md-stitle { font-size: 14px; }
  .md-scnt { font-size: 12px; padding: 2px 10px; }
  .md-row {
    padding: 12px 10px; gap: 12px; border-radius: var(--r); align-items: flex-start;
  }
  .md-row+.md-row { border-top-color: var(--bdr); }
  .md-cb { width: 22px; height: 22px; margin-top: 2px; }
  .md-task { font-size: 15px; line-height: 1.4; font-weight: 500; }
  .md-co { font-size: 12px; margin-top: 4px; line-height: 1.4; }
  .md-grid { grid-template-columns: 1fr; gap: 14px; }

  /* Tables: horizontal scroll wrapper */
  .tbl-wrap, .tk-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--rl); }
  table.ct, table.tkt { font-size: 14px; min-width: 620px; }
  table.ct th, table.tkt th { padding: 10px 12px; font-size: 11px; }
  table.ct td, table.tkt td { padding: 12px 12px; }
  .t-name, .tk-co { font-size: 14px; }
  .tk-title { font-size: 14px; line-height: 1.4; }
  .tsbtn { padding: 7px 12px; font-size: 12px; }
  /* Table options (column checkboxes) — stack */
  .tbl-opts { flex-direction: column; align-items: stretch; font-size: 13px; gap: 10px; }
  .tbl-opts label { padding: 4px 0; }

  /* Task toolbar: vertical stack */
  .tk-opts { flex-direction: column; align-items: stretch; gap: 10px; }
  .tk-opts .vbar { width: 100%; }
  .tk-opts select { width: 100%; height: 44px; font-size: 15px; }
  .tk-opts .btn { width: 100%; justify-content: center; }
  .tk-opts .hint { font-size: 11px; color: var(--text3); text-align: center; }

  /* Kanban: allow horizontal scroll, tighter columns */
  .kb-col { width: 260px; }
  .kb-name { font-size: 14px; }
  .kb-val { font-size: 12px; }
  .kb-next { font-size: 12px; padding: 6px 9px; line-height: 1.4; }

  /* ═════ Modal: full screen on phones ═════ */
  .overlay { padding: 0; }
  .modal {
    width: 100%;
    max-width: 100%;
    max-height: 100vh;
    border-radius: 0;
    border: none;
    padding: 16px 18px 0;
    min-height: 100vh;
  }
  .modal > .mfoot {
    margin: 16px -18px 0;
    padding: 12px 18px 18px;
  }
  /* Close button: fixed top right, bigger */
  .modal .mh { font-size: 19px; padding-right: 40px; }

  /* Form rows: all single column on phone */
  .fr, .fr.tri { grid-template-columns: 1fr !important; gap: 12px; margin-bottom: 12px; }
  .fr label { font-size: 13px; margin-bottom: 5px; }
  .fr input, .fr select, .fr textarea {
    height: 44px; font-size: 16px; padding: 0 12px;
  }
  .fr textarea { min-height: 80px; padding: 10px 12px; height: auto; }
  .fr input[type=date] { padding: 0 10px; }

  /* Detail view: bigger, more breathing room */
  .dbox { padding: 12px 14px; margin-bottom: 10px; border-radius: var(--r); }
  .dl { font-size: 11px; margin-bottom: 4px; }
  .dv { font-size: 14px; }
  .d2 { grid-template-columns: 1fr; gap: 10px; }

  /* Task items in detail: iOS checkbox feel */
  .titem {
    padding: 12px 12px; gap: 10px; font-size: 14px;
    flex-wrap: wrap; border-radius: var(--r);
  }
  .titem input[type=checkbox] { width: 22px; height: 22px; flex-shrink: 0; }
  .titem .tt { font-size: 15px; line-height: 1.4; min-width: 0; }
  .titem .tdp { font-size: 11px; padding: 3px 8px; }
  .tdel { width: 30px; height: 30px; font-size: 20px; }

  /* Add-task input: stack vertically on phone */
  .add-task {
    flex-direction: column; align-items: stretch; gap: 8px; margin-top: 12px;
  }
  .add-task input[type=text] { height: 44px; font-size: 16px; padding: 0 12px; width: 100%; }
  .add-task input[type=date] { height: 44px; font-size: 15px; width: 100%; }
  .add-task input[type=number] { height: 44px; font-size: 15px; width: 100%; }
  .add-task select { height: 44px; font-size: 15px; width: 100%; }
  .add-task .abtn { height: 44px; padding: 0 16px; font-size: 14px; width: 100%; }

  /* Modal footer: stack buttons on small screens */
  .mfoot {
    flex-direction: column;
    gap: 8px;
  }
  .mfoot .btn { width: 100%; justify-content: center; height: 46px; font-size: 15px; font-weight: 600; }

  /* Children section in detail */
  .children-section { padding: 12px 14px; }
  .aggregate-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .agg-card { padding: 10px 12px; }
  .agg-n { font-size: 20px; }

<script>
// ── State ──────────────────────────────────────────────────────────────────
const STORE      = 'rc_tracker_v1';
const SYNC_STORE = 'rc_sync_cfg';
const QUEUE_STORE= 'rc_sync_queue';
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let REC = [], NID = 1, TID = 100;
let activeTab = 'all', activeView = 'myday';
let PRJ = [], PJID = 1;  // Projects (separate from REC)
const DEFAULT_CATEGORIES = ['Price Increase', 'Administration', 'CRM', 'Reporting', 'Training', 'Marketing', 'Operations', 'Other'];
let PROJECT_CATEGORIES = [...DEFAULT_CATEGORIES];
let tblSort = '', tblDir = 1, expandedRow = null;
let pendingImport = [];

// ── Sync config ────────────────────────────────────────────────────────────
// syncCfg: { scriptUrl: string }
let syncCfg = {};
let syncQueue = []; // array of {id, op:'push'|'delete', ts, data}
let syncInFlight = false;
let isOnline = navigator.onLine;

function loadSyncCfg() {
  try { syncCfg  = JSON.parse(localStorage.getItem(SYNC_STORE)  || '{}'); } catch(e) { syncCfg = {}; }
  try { syncQueue = JSON.parse(localStorage.getItem(QUEUE_STORE) || '[]'); } catch(e) { syncQueue = []; }
}
function saveSyncCfg() { localStorage.setItem(SYNC_STORE, JSON.stringify(syncCfg)); }
function saveQueue()   { localStorage.setItem(QUEUE_STORE, JSON.stringify(syncQueue)); }

// ── Connectivity listeners ─────────────────────────────────────────────────
window.addEventListener('online',  () => { isOnline = true;  updateSyncStatus(); flushQueue(); });
window.addEventListener('offline', () => { isOnline = false; updateSyncStatus(); });

function updateSyncStatus() {
  const el = $('sync-status'); if (!el) return;
  const btn = $('sync-btn');
  if (!syncCfg.scriptUrl) {
    el.innerHTML = '<span style="color:var(--text3)">☁ Sync not configured</span>';
    if (btn) btn.style.borderColor = '';
    return;
  }
  if (!isOnline) {
    const q = syncQueue.length;
    el.innerHTML = `<span style="color:var(--amb)">📵 Offline${q ? ` — ${q} change${q>1?'s':''} queued` : ''}</span>`;
    if (btn) { btn.style.background='var(--amb-s)'; btn.style.color='var(--amb-t)'; btn.style.borderColor='var(--gold)'; }
    return;
  }
  if (syncInFlight) {
    el.innerHTML = '<span style="color:var(--text3)">⟳ Syncing…</span>';
    return;
  }
  if (syncQueue.length) {
    el.innerHTML = `<span style="color:var(--amb)">⏳ ${syncQueue.length} pending</span>`;
    return;
  }
  el.innerHTML = '<span style="color:var(--grn)">✓ Synced</span>';
  if (btn) { btn.style.background=''; btn.style.color=''; btn.style.borderColor=''; }
}

// ── Google Sheets push/pull ────────────────────────────────────────────────
// Apps Script redirects every request. Use GET-only with encoded payload to
// avoid CORS preflight failures entirely.
async function pushToSheets(fullData) {
  if (!syncCfg.scriptUrl) return;
  const payload = encodeURIComponent(JSON.stringify({
    rec: fullData.rec, nid: fullData.nid, tid: fullData.tid,
    prj: fullData.prj || [], pjid: fullData.pjid || 1,
    cats: fullData.cats || null, ts: fullData.ts
  }));
  const url = syncCfg.scriptUrl + '?action=set&d=' + payload + '&cb=' + Date.now();
  const resp = await fetch(url, {redirect: 'follow'});
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const body = await resp.json();
  // VERIFY the Apps Script actually saved — it returns {ok:true} on success.
  // If it returns {error: '...'} or anything else, treat as failure.
  if (!body || body.ok !== true) {
    throw new Error('Apps Script rejected the push: ' + JSON.stringify(body));
  }
  return body;
}
async function pullFromSheets() {
  if (!syncCfg.scriptUrl) return null;
  const url = syncCfg.scriptUrl + '?action=get&cb=' + Date.now();
  const resp = await fetch(url, {redirect: 'follow'});
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return resp.json();
}

// ── Queue flush ────────────────────────────────────────────────────────────
async function flushQueue() {
  if (!syncCfg.scriptUrl || !isOnline || syncInFlight || !syncQueue.length) return false;
  syncInFlight = true; updateSyncStatus();
  let ok = false;
  try {
    // Snapshot which queue entries we're sending. We'll only clear THESE entries
    // on success, NOT the whole queue, so any new entries that arrive during the
    // network roundtrip will still trigger another flush.
    const snapshotCount = syncQueue.length;
    const ts = Date.now();
    const payload = {rec: REC, nid: NID, tid: TID, prj: PRJ, pjid: PJID, cats: PROJECT_CATEGORIES, ts};
    await pushToSheets(payload);
    // Only remove the entries we saw when we started — any that arrived after
    // represent changes to REC that happened AFTER we took our snapshot and
    // still need to be pushed.
    syncQueue = syncQueue.slice(snapshotCount);
    saveQueue();
    localStorage.setItem('rc_last_push_ts', String(ts));
    ok = true;
  } catch(e) {
    console.warn('Sync flush failed:', e);
  }
  syncInFlight = false; updateSyncStatus();
  // If new changes accumulated during the flush (or a retry is pending), flush again.
  if (ok && syncQueue.length) {
    // Fire-and-forget re-flush for any changes that arrived during the roundtrip.
    // Don't await — we'll return now and the caller can retry if needed.
    setTimeout(() => flushQueue(), 10);
  }
  return ok;
}

// Queue a change and try to flush immediately
// Returns a promise that resolves when the flush completes (or fails)
async function queueSync() {
  syncQueue.push({ts: Date.now()});
  saveQueue(); updateSyncStatus();
  if (isOnline) return await flushQueue();
  return false;
}

// ── Load from Sheets on startup (if online) ────────────────────────────────
async function loadFromSheets() {
  if (!syncCfg.scriptUrl || !isOnline) return false;
  try {
    syncInFlight = true; updateSyncStatus();
    const d = await pullFromSheets();
    if (!d) { syncInFlight = false; updateSyncStatus(); return false; }

    // Use the remote ts as the source of truth, even when rec is empty.
    // This is critical so deletions on one device propagate to others.
    const lastPushTs  = parseInt(localStorage.getItem('rc_last_push_ts') || '0');
    const remoteTs    = d.ts || 0;
    const hasPending  = syncQueue.length > 0;
    const remoteRec   = Array.isArray(d.rec) ? d.rec : [];

    if (hasPending || syncInFlight) {
      // We have local changes that haven't synced yet — push them up first
      // (syncInFlight means another push is happening; wait for it instead of pulling stale)
      if (hasPending) await flushQueue();
    } else if (remoteTs > lastPushTs) {
      REC = remoteRec;
      NID = d.nid || NID;
      TID = d.tid || TID;
      PRJ = Array.isArray(d.prj) ? d.prj : [];
      PJID = d.pjid || 1;
      if (d.cats && Array.isArray(d.cats) && d.cats.length) PROJECT_CATEGORIES = d.cats;
      localStorage.setItem(STORE, JSON.stringify({rec:REC, nid:NID, tid:TID, prj:PRJ, pjid:PJID, cats:PROJECT_CATEGORIES}));
      localStorage.setItem('rc_last_push_ts', String(remoteTs));
      render();
    } else if (remoteTs === 0 && lastPushTs === 0 && remoteRec.length > 0 && REC.length === 0) {
      REC = remoteRec;
      NID = d.nid || NID;
      TID = d.tid || TID;
      PRJ = Array.isArray(d.prj) ? d.prj : [];
      PJID = d.pjid || 1;
      if (d.cats && Array.isArray(d.cats) && d.cats.length) PROJECT_CATEGORIES = d.cats;
      localStorage.setItem(STORE, JSON.stringify({rec:REC, nid:NID, tid:TID, prj:PRJ, pjid:PJID, cats:PROJECT_CATEGORIES}));
      render();
    } else {
      // Local is newer or tied — push local up to make sure remote matches
      // (only if our local actually has content OR we know we have a recent push)
      if (lastPushTs > 0 || REC.length > 0) {
        syncQueue.push({ts: Date.now()}); saveQueue();
        await flushQueue();
      }
    }
    syncInFlight = false; updateSyncStatus();
    return true;
  } catch(e) {
    console.warn('Could not load from Sheets:', e);
    syncInFlight = false; updateSyncStatus();
    return false;
  }
}

// ── Utility ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function save() {
  localStorage.setItem(STORE, JSON.stringify({rec: REC, nid: NID, tid: TID, prj: PRJ, pjid: PJID, cats: PROJECT_CATEGORIES}));
  const el = $('sv'); if (el) el.textContent = 'Saved ' + new Date().toLocaleTimeString();
  queueSync();
}
async function saveAndWait() {
  localStorage.setItem(STORE, JSON.stringify({rec: REC, nid: NID, tid: TID, prj: PRJ, pjid: PJID, cats: PROJECT_CATEGORIES}));
  const el = $('sv'); if (el) el.textContent = 'Saved ' + new Date().toLocaleTimeString();

  // Tag THIS change with a unique marker so we can verify it was actually pushed.
  const myMarker = {ts: Date.now(), id: 'm' + Math.random().toString(36).slice(2,9)};
  syncQueue.push(myMarker); saveQueue(); updateSyncStatus();

  if (!syncCfg.scriptUrl || !isOnline) return false;

  // Wait for our specific marker to be flushed. We check every 100ms for up to
  // 20 seconds, kicking off additional flushes as needed.
  const deadline = Date.now() + 20000;
  let retries = 0;
  while (Date.now() < deadline) {
    // Is our marker still in the queue?
    const stillQueued = syncQueue.some(q => q.id === myMarker.id);
    if (!stillQueued) return true; // our change has been flushed
    // Not flushed yet — if nothing is in flight, try to flush
    if (!syncInFlight) {
      const ok = await flushQueue();
      if (!ok) {
        retries++;
        if (retries >= 5) break;
        // Short backoff before trying again
        await new Promise(res => setTimeout(res, 400 * retries));
      }
    } else {
      // Something else is pushing; wait for it to finish
      await new Promise(res => setTimeout(res, 100));
    }
  }
  alert('⚠️ Warning: Your change was saved locally but could not sync to Google Sheets ' +
        'within 20 seconds. Check your internet connection and click the ☁ Sync button, ' +
        'or the change may revert the next time this page reloads.');
  return false;
}
function load() {
  loadSyncCfg();
  try {
    const d = JSON.parse(localStorage.getItem(STORE) || '{}');
    if (d.rec && d.rec.length) {
      REC = d.rec; NID = d.nid || 1; TID = d.tid || 100;
      PRJ = d.prj || []; PJID = d.pjid || 1;
      if (d.cats && Array.isArray(d.cats) && d.cats.length) PROJECT_CATEGORIES = d.cats;
      // Migration: any records with stage='Lost' -> move to 'On Hold' with a note
      let migrated = 0;
      REC.forEach(r => {
        if (r.stage === 'Lost') {
          r.stage = 'On Hold';
          r.holdReason = (r.holdReason ? r.holdReason + ' — ' : '') + 'Previously marked Lost';
          migrated++;
        }
      });
      if (migrated > 0) save();
    } else seed();
  } catch(e) { seed(); }
}
function tid() { return 'tk' + (TID++); }
function pDate(s) { if (!s) return null; const d = new Date(s + 'T00:00:00'); return isNaN(d) ? null : d; }
function dDiff(s) { const d = pDate(s); return d ? Math.round((d - TODAY) / 864e5) : null; }
function dStat(s) { const x = dDiff(s); if (x === null) return 'none'; if (x < 0) return 'over'; if (x <= 3) return 'soon'; return 'ok'; }
function dLbl(s) {
  const x = dDiff(s);
  if (x === null) return '';
  if (x < 0) return 'Overdue ' + Math.abs(x) + 'd';
  if (x === 0) return 'Due today';
  if (x === 1) return 'Due tomorrow';
  return 'Due ' + fDate(s);
}
function fDate(s) {
  if (!s) return '';
  const d = pDate(s);
  return d ? d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : s;
}
function dpCls(s) { const st = dStat(s); return st === 'over' ? 'due-over' : st === 'soon' ? 'due-soon' : 'due-ok'; }
function scls(s) { return 'b-' + s.toLowerCase().replace(/\s+/g,'-'); }
function pcls(p) { return p === 'High' ? 'p-hi' : p === 'Medium' ? 'p-md' : 'p-lo'; }
function sdot(s) {
  const m = {Prospect:'#1B2A4A',Active:'#1A7A52',Proposal:'#C9A84C',Won:'#0D4A2F',Customer:'#1B2A4A','On Hold':'#9B8F82','New Request':'#C9A84C'};
  return m[s] || '#aaa';
}
function sbg(s) {
  const m = {Prospect:'#E8EDF5',Active:'#E0F3EA',Proposal:'#F5E6B8',Won:'#D6F0E8',Customer:'#E8EDF5','On Hold':'#EDE5D8','New Request':'#F5E6B8'};
  return m[s] || '#eee';
}
function sfg(s) {
  const m = {Prospect:'#1B2A4A',Active:'#0D4A2F',Proposal:'#7A5E10',Won:'#0D4A2F',Customer:'#1B2A4A','On Hold':'#3D2E1E','New Request':'#7A5E10'};
  return m[s] || '#333';
}
function openTasks(r) { return (r.tasks || []).filter(t => !t.done); }
function soonest(r) {
  return openTasks(r).filter(t => t.due).sort((a,b) => pDate(a.due) - pDate(b.due))[0]
    || openTasks(r).filter(t => !t.due)[0]
    || null;
}

// ── Priority system (P1/P2/P3) ────────────────────────────────────────────
// Auto rule:
//   P1 (Urgent):     due in 0-7 days, including overdue
//   P2 (Do Soon):    due in 8-14 days
//   P3 (Parking Lot): due in 15+ days (or manually set)
//   None:            no due date
// Manual override: t.priorityOverride is one of 'P1','P2','P3','None'
function autoPriority(t) {
  if (!t.due) return 'None';
  const d = dDiff(t.due);
  if (d === null) return 'None';
  if (d <= 7) return 'P1';
  if (d <= 14) return 'P2';
  return 'P3';
}
function taskPriority(t) {
  if (t.priorityOverride && ['P1','P2','P3','None'].includes(t.priorityOverride)) {
    return t.priorityOverride;
  }
  return autoPriority(t);
}
function priorityLabel(p) {
  return p==='P1'?'P1 — Urgent':p==='P2'?'P2 — Do Soon':p==='P3'?'P3 — Parking Lot':'No Priority';
}
function priorityClass(p) {
  return p==='P1'?'p1':p==='P2'?'p2':p==='P3'?'p3':'pn';
}
function priorityShort(p) {
  return p==='None' ? 'No Priority' : p;
}

// ── Parent/Child relationship helpers ──────────────────────────────────────
function isParent(r) { return REC.some(x => x.parentId === r.id); }
function isChild(r)  { return r.parentId != null && r.parentId !== ''; }
function getChildren(parentId) { return REC.filter(r => r.parentId === parentId); }
function getParent(r) {
  if (!isChild(r)) return null;
  return REC.find(x => x.id === r.parentId);
}
// Recursively gather all tasks for a parent + its children
function aggregateTasks(parent) {
  const out = [...(parent.tasks || [])];
  getChildren(parent.id).forEach(child => {
    (child.tasks||[]).forEach(t => out.push({...t, _from: child.company, _childId: child.id}));
  });
  return out;
}

// ── Recurrence system ──────────────────────────────────────────────────────
// Stored on the task as: t.recurrence = {unit:'days'|'weeks'|'months', count:N}
// When a recurring task is checked complete, the original is kept (for history)
// and a NEW open task with same title/recurrence is created with a due date
// equal to (completion date) + (interval).
function recurrenceLabel(rec) {
  if (!rec || !rec.unit || !rec.count) return '';
  const c = parseInt(rec.count);
  if (!c || c < 1) return '';
  const u = rec.unit;
  const single = u==='days'?'day':u==='weeks'?'week':'month';
  const plural = u==='days'?'days':u==='weeks'?'weeks':'months';
  return c === 1 ? `every ${single}` : `every ${c} ${plural}`;
}
function recurrenceShort(rec) {
  if (!rec || !rec.unit || !rec.count) return '';
  const c = parseInt(rec.count);
  if (!c || c < 1) return '';
  return c + (rec.unit==='days'?'d':rec.unit==='weeks'?'w':'m');
}
// Compute next due date as a YYYY-MM-DD string given a base date (ISO or Date)
// and a recurrence config. Returns '' if config invalid.
function nextRecurrenceDate(baseISO, rec) {
  if (!rec || !rec.unit || !rec.count) return '';
  const n = parseInt(rec.count); if (!n || n < 1) return '';
  const base = baseISO ? new Date(baseISO + 'T00:00:00') : new Date();
  base.setHours(0,0,0,0);
  if (rec.unit === 'days')   base.setDate(base.getDate() + n);
  if (rec.unit === 'weeks')  base.setDate(base.getDate() + n * 7);
  if (rec.unit === 'months') base.setMonth(base.getMonth() + n);
  return base.getFullYear()+'-'+String(base.getMonth()+1).padStart(2,'0')+'-'+String(base.getDate()).padStart(2,'0');
}

function closeRecurrenceDialog(kind, ownerId) {
  // Restore the original detail view
  if (kind === 'customer') openDetail(parseInt(ownerId));
  else openProjectDetail(String(ownerId));
}

function saveRecurrence(kind, ownerId, taskId) {
  const owner = kind === 'customer'
    ? REC.find(x => x.id === parseInt(ownerId))
    : PRJ.find(x => x.id === String(ownerId));
  if (!owner) return;
  const t = (owner.tasks||[]).find(x => x.id === taskId);
  if (!t) return;
  const unit  = ($('rec-unit')?.value || '').trim();
  const count = parseInt($('rec-count')?.value || '0');
  if (!unit || !count || count < 1) {
    delete t.recurrence;
  } else {
    t.recurrence = {unit, count};
  }
  save();
  closeRecurrenceDialog(kind, ownerId);
  render();
}

function clearRecurrence(kind, ownerId, taskId) {
  const owner = kind === 'customer'
    ? REC.find(x => x.id === parseInt(ownerId))
    : PRJ.find(x => x.id === String(ownerId));
  if (!owner) return;
  const t = (owner.tasks||[]).find(x => x.id === taskId);
  if (t) { delete t.recurrence; save(); }
  closeRecurrenceDialog(kind, ownerId);
  render();
}

function projectOpenTasks(p) { return (p.tasks || []).filter(t => !t.done); }
function projectCompletedTasks(p) { return (p.tasks || []).filter(t => t.done); }

// ── Unified task collector — pulls from BOTH customer records AND projects
//    Returns {ref, refType: 'customer'|'project', t}
//    refType lets renderers display the right context (company vs project name)
function allOpenTasks() {
  const items = [];
  REC.forEach(r => openTasks(r).forEach(t => items.push({ref:r, refType:'customer', t})));
  PRJ.forEach(p => projectOpenTasks(p).forEach(t => items.push({ref:p, refType:'project', t})));
  return items;
}
function allCompletedTasks() {
  const items = [];
  REC.forEach(r => (r.tasks||[]).filter(t=>t.done).forEach(t => items.push({ref:r, refType:'customer', t})));
  PRJ.forEach(p => projectCompletedTasks(p).forEach(t => items.push({ref:p, refType:'project', t})));
  return items;
}

// ── Filtering ──────────────────────────────────────────────────────────────
function filtered() {
  const q  = ($('srch') || {value:''}).value.toLowerCase();
  const sf = ($('sf')   || {value:''}).value;
  const pf = ($('pf')   || {value:''}).value;
  const hideChildren = $('hide-children')?.checked || false;
  return REC.filter(r => {
    if (hideChildren && isChild(r)) return false;
    if (activeTab === 'prospect' && r.type !== 'prospect') return false;
    if (activeTab === 'account'  && r.type !== 'account')  return false;
    if (activeTab === 'request'  && !(r.type === 'account' && r.stage === 'New Request')) return false;
    if (activeTab === 'hold'     && r.stage !== 'On Hold')  return false;
    if (activeTab === 'due') {
      const hasDue = openTasks(r).some(t => { const x = dDiff(t.due); return x !== null && x <= 7 && x >= 0; });
      if (!hasDue) return false;
    }
    if (sf && r.stage !== sf) return false;
    if (pf && r.priority !== pf) return false;
    if (q && !`${r.company} ${r.name||''} ${r.need||''} ${r.accountNumber||''} ${r.chainNumber||''} ${(r.tasks||[]).map(t=>t.title).join(' ')} ${r.holdReason||''}`.toLowerCase().includes(q)) return false;
    return true;
  });
}
