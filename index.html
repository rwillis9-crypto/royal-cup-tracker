  let list = filtered();
  if (tblSort) {
    list = [...list].sort((a,b) => {
      if (tblSort === 'due') {
        const sa = soonest(a), sb = soonest(b);
        const da = sa&&sa.due?pDate(sa.due):null, db = sb&&sb.due?pDate(sb.due):null;
        if (da&&db) return tblDir*(da-db); return da?-tblDir:tblDir;
      }
      if (tblSort === 'install') { const da=pDate(a.installDate),db=pDate(b.installDate); if(da&&db)return tblDir*(da-db);return da?-tblDir:tblDir; }
      if (tblSort === 'priority') return tblDir*((pOrd[a.priority]??9)-(pOrd[b.priority]??9));
      if (tblSort === 'stage') return tblDir*((sOrd[a.stage]??9)-(sOrd[b.stage]??9));
      return tblDir*String(a[tblSort]||'').localeCompare(String(b[tblSort]||''));
    });
  }
  const sv = $('c-val')?.checked, si = $('c-inst')?.checked, sp = $('c-pri')?.checked;
  const sc = $('c-cont')?.checked, sph = $('c-phone')?.checked;
  function th(lbl,key) { const a = tblSort===key; return `<th class="${a?(tblDir===1?'sa':'sd'):''}" onclick="tSort('${key}')">${lbl}</th>`; }
  const thead = `<thead><tr>
    ${th('Company','company')}${th('Stage','stage')}${sp?th('Priority','priority'):''}
    ${th('Need','need')}${th('Next Task','task')}${th('Due','due')}
    ${si?th('Install Date','install'):''}${sv?th('Value','value'):''}
    ${sc?th('Email','contact'):''}${sph?th('Phone','phone'):''}<th></th>
  </tr></thead>`;
  const tbody = '<tbody>' + list.map(r => {
    const isA = r.type === 'account';
    const st  = soonest(r);
    const ot  = openTasks(r).length;
    const dl  = st&&st.due ? dLbl(st.due) : '';
    const iDs = dStat(r.installDate);
    const iCls = iDs==='over'?'due-over':iDs==='soon'?'due-soon':'due-ok';
    const isExp = expandedRow === r.id;
    const colCount = 6+(sp?1:0)+(si?1:0)+(sv?1:0)+(sc?1:0)+(sph?1:0)+1;
    let row = `<tr class="${isA?'r-acc':'r-pro'}" onclick="toggleExp(${r.id})">
      <td><div class="t-name">${r.company}</div>${r.name?`<div class="t-sub">${r.name}</div>`:''}</td>
      <td><span class="bdg ${scls(r.stage)}">${r.stage}</span></td>
      ${sp?`<td><span class="${pcls(r.priority)}">${r.priority}</span></td>`:''}
      <td><div class="t-clip" title="${r.need||''}">${r.need||'—'}</div></td>
      <td><div class="t-clip">${st?st.title.substring(0,50)+(st.title.length>50?'…':'')+(ot>1?` <span style="color:var(--text3);font-size:10px">(+${ot-1})</span>`:''): '<span style="color:var(--text3)">—</span>'}</div></td>
      <td>${dl?`<span class="dpill ${dpCls(st.due)}">${dl}</span>`:'<span style="color:var(--text3);font-size:11px">—</span>'}</td>
      ${si?`<td>${r.installDate?`<span class="dpill ${iCls}" style="font-size:11px">${fDate(r.installDate)}</span>`:'<span style="color:var(--text3);font-size:11px">—</span>'}</td>`:''}
      ${sv?`<td>${r.value||'—'}</td>`:''}
      ${sc?`<td style="font-size:12px">${r.contact||'—'}</td>`:''}
      ${sph?`<td>${r.phone||'—'}</td>`:''}
      <td class="t-act" onclick="event.stopPropagation()">
        <button class="tsbtn" onclick="openEdit(${r.id})">Edit</button>
        <button class="tsbtn del" onclick="delRec(${r.id})">Del</button>
      </td>
    </tr>`;
    if (isExp) {
      row += `<tr class="exp-row"><td colspan="${colCount}">
        <div class="exp-grid">
          ${r.need?`<div class="ef" style="grid-column:1/-1"><label>Need / Request</label><p>${r.need}</p></div>`:''}
          ${r.holdReason?`<div class="ef" style="grid-column:1/-1"><label>Hold reason</label><p>${r.holdReason}</p></div>`:''}
          ${r.contact?`<div class="ef"><label>Email</label><p>${r.contact}</p></div>`:''}
          ${r.phone?`<div class="ef"><label>Phone</label><p>${r.phone}</p></div>`:''}
          ${r.value?`<div class="ef"><label>Value</label><p>${r.value}</p></div>`:''}
          ${r.owner?`<div class="ef"><label>Owner</label><p>${r.owner}</p></div>`:''}
        </div>
        ${openTasks(r).length?`<div style="margin-top:8px">
          <label style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)">Open Tasks (${openTasks(r).length})</label>
          <p style="font-size:12px;color:var(--text);margin-top:4px;line-height:1.8;white-space:pre-line">${openTasks(r).map((t,i)=>(i+1)+'. '+t.title+(t.due?' — due '+fDate(t.due):'')).join('\n')}</p>
        </div>`:''}
        <div style="margin-top:8px;display:flex;gap:6px">
          <button class="btn" style="height:27px;font-size:11px" onclick="openDetail(${r.id})">Full view</button>
          <button class="btn" style="height:27px;font-size:11px" onclick="openEdit(${r.id})">Edit</button>
        </div>
      </td></tr>`;
    }
    return row;
  }).join('') + '</tbody>';
  $('ct').innerHTML = thead + tbody;
}
function tSort(col) { if (tblSort===col) tblDir*=-1; else {tblSort=col;tblDir=1;} renderTable(); }
function toggleExp(id) { expandedRow = expandedRow===id ? null : id; renderTable(); }

// ── My Day View ────────────────────────────────────────────────────────────
function renderMyDay() {
  const q = ($('srch')?.value || '').toLowerCase().trim();
  let items = allOpenTasks();
  // Apply search filter
  if (q) {
    items = items.filter(({ref, refType, t}) => {
      const ctx = refType === 'customer'
        ? `${ref.company} ${ref.name||''} ${ref.accountNumber||''} ${ref.chainNumber||''}`
        : `${ref.title||''} ${ref.category||''} ${ref.description||''}`;
      const hay = `${t.title} ${ctx}`.toLowerCase();
      return hay.includes(q);
    });
  }
  // EXCLUDE P3 from active lists per the requirement; P3 has its own section
  const active = items.filter(({t}) => taskPriority(t) !== 'P3');

  // Categorize the active items
  const overdue = active.filter(({t}) => t.due && dDiff(t.due) < 0)
    .sort((a,b) => dDiff(a.t.due) - dDiff(b.t.due));
  const todayItems = active.filter(({t}) => t.due && dDiff(t.due) === 0);
  const tomorrow = active.filter(({t}) => t.due && dDiff(t.due) === 1);
  // This week = days 2-7 (today and tomorrow excluded; overdue excluded)
  const thisWeek = active.filter(({t}) => {
    const d = dDiff(t.due);
    return d !== null && d >= 2 && d <= 7;
  }).sort((a,b) => dDiff(a.t.due) - dDiff(b.t.due));
  // P3 / Parking Lot
  const parkingLot = items.filter(({t}) => taskPriority(t) === 'P3')
    .sort((a,b) => {
      const da = dDiff(a.t.due), db = dDiff(b.t.due);
      if (da !== null && db !== null) return da - db;
      return da !== null ? -1 : db !== null ? 1 : 0;
    });

  const today = new Date();
  const dayStr = today.toLocaleDateString('en-US',
    {weekday:'long', month:'long', day:'numeric', year:'numeric'});

  function rowHTML({ref, refType, t}) {
    const p = taskPriority(t);
    const pCls = priorityClass(p);
    const ctx = refType === 'customer'
      ? `${ref.company}` + (ref.type==='account'?' · Account':' · Prospect')
      : `${ref.title || 'Project'} · 🗂 Project`;
    const dueLbl = t.due ? dLbl(t.due) || fDate(t.due) : '';
    const id = refType === 'customer' ? ref.id : "'"+ref.id+"'";
    const open = refType === 'customer' ? `openDetail(${ref.id})` : `openProjectDetail('${ref.id}')`;
    const toggle = refType === 'customer' ? `toggleTask(${ref.id},'${t.id}')` : `toggleProjectTask('${ref.id}','${t.id}')`;
    return `<div class="md-row" onclick="${open}">
      <input type="checkbox" class="md-cb" ${t.done?'checked':''}
        onclick="event.stopPropagation();${toggle}">
      <div class="md-task">${t.title}<div class="md-co">${ctx}</div></div>
      ${dueLbl ? `<span class="dpill ${dpCls(t.due)}">${dueLbl}</span>` : ''}
      <span class="ppill ${pCls}">${priorityShort(p)}</span>
    </div>`;
  }

  function section(dotColor, title, items, emptyMsg) {
    return `<div class="md-section">
      <div class="md-shdr">
        <div class="md-sdot" style="background:${dotColor}"></div>
        <span class="md-stitle" style="color:${dotColor}">${title}</span>
        <span class="md-scnt">${items.length}</span>
      </div>
      ${items.length ? items.map(rowHTML).join('') : `<div class="md-empty">${emptyMsg}</div>`}
    </div>`;
  }

  $('myday-content').innerHTML = `
    <div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:18px;font-weight:600;letter-spacing:-.3px;color:var(--navy)">${dayStr}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">Your day at a glance</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;font-size:11px;color:var(--text2)">
        <span class="ppill p1">P1</span> Urgent &nbsp;
        <span class="ppill p2">P2</span> Do Soon &nbsp;
        <span class="ppill p3">P3</span> Parking Lot
      </div>
    </div>
    ${section('#B83030', '🔴 Overdue', overdue, 'Nothing overdue — well done!')}
    ${section('#9A6B00', '⭐ Due Today', todayItems, 'Nothing scheduled for today')}
    <div class="md-grid">
      ${section('#1B2A4A', '🔜 Due Tomorrow', tomorrow, 'Nothing due tomorrow')}
      ${section('#1A7A52', '📅 Rest of This Week', thisWeek, 'Nothing else this week')}
    </div>
    ${section('#5C5246', '🅿️ Parking Lot — P3', parkingLot, 'No Parking Lot items')}
  `;
}

// ── Projects View ──────────────────────────────────────────────────────────
function renderProjects() {
  // Refresh category dropdown
  const catSel = $('prj-cat');
  if (catSel) {
    const current = catSel.value;
    catSel.innerHTML = '<option value="">All categories</option>'
      + PROJECT_CATEGORIES.map(c => `<option ${current===c?'selected':''}>${c}</option>`).join('');
  }

  const statusF = $('prj-status')?.value || 'all';
  const catF    = $('prj-cat')?.value || '';
  const priF    = $('prj-pri')?.value || '';
  // Honor both the main search and the project-specific search
  const q       = (($('srch')?.value || '') + ' ' + ($('prj-search')?.value || '')).trim().toLowerCase();

  let list = PRJ.filter(p => {
    if (statusF === 'active' && p.status === 'Complete') return false;
    if (statusF !== 'all' && statusF !== 'active' && p.status !== statusF) return false;
    if (catF && p.category !== catF) return false;
    if (priF) {
      // Project priority is the soonest open task's priority, OR the project's manual priority
      const pPri = projectPriority(p);
      if (priF === 'None' ? pPri !== 'None' : pPri !== priF) return false;
    }
    if (q) {
      const hay = `${p.title} ${p.description||''} ${p.notes||''} ${p.category||''} ${(p.tasks||[]).map(t=>t.title).join(' ')}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  // Sort: Active first, then by next-due, then complete at end
  list.sort((a,b) => {
    if ((a.status==='Complete') !== (b.status==='Complete')) return a.status==='Complete' ? 1 : -1;
    const at = projectNextDue(a), bt = projectNextDue(b);
    if (at && bt) return at.localeCompare(bt);
    if (at) return -1; if (bt) return 1;
    return a.title.localeCompare(b.title);
  });

  if (!list.length) {
    $('projects-content').innerHTML = '<div class="empty-msg">No projects match your filters.</div>';
    return;
  }

  $('projects-content').innerHTML = '<div class="cards-grid">' +
    list.map(projectCardHTML).join('') + '</div>';
}

function projectPriority(p) {
  if (p.priorityOverride && ['P1','P2','P3','None'].includes(p.priorityOverride)) return p.priorityOverride;
  // Compute from soonest open task
  const tasks = projectOpenTasks(p);
  if (!tasks.length) return p.dueDate ? autoPriority({due:p.dueDate}) : 'None';
  // Use most-urgent of any open task or the project itself
  const candidates = tasks.map(autoPriority);
  if (p.dueDate) candidates.push(autoPriority({due:p.dueDate}));
  if (candidates.includes('P1')) return 'P1';
  if (candidates.includes('P2')) return 'P2';
  if (candidates.includes('P3')) return 'P3';
  return 'None';
}

function projectNextDue(p) {
  const dates = [];
  if (p.dueDate) dates.push(p.dueDate);
  projectOpenTasks(p).forEach(t => { if (t.due) dates.push(t.due); });
  if (!dates.length) return null;
  dates.sort();
  return dates[0];
}

function projectCardHTML(p) {
  const stCls = p.status === 'Complete' ? 'st-co' : p.status === 'In Progress' ? 'st-ip' : 'st-ns';
  const pri = projectPriority(p);
  const pCls = priorityClass(pri);
  const open = projectOpenTasks(p).length;
  const done = projectCompletedTasks(p).length;
  const total = open + done;
  const pct = total ? Math.round((done/total)*100) : 0;
  const nextDue = projectNextDue(p);
  const nextLbl = nextDue ? dLbl(nextDue) || fDate(nextDue) : '';
  const nextCls = nextDue ? dpCls(nextDue) : '';
  return `<div class="card is-prj" onclick="openProjectDetail('${p.id}')">
    <div class="c-top">
      <div>
        <div class="c-name">${p.title}</div>
        ${p.category ? `<div class="c-sub">${p.category}</div>` : ''}
      </div>
      <div class="c-badges">
        <span class="${stCls}">${p.status||'Not Started'}</span>
        <span class="b-prj">Project</span>
      </div>
    </div>
    ${p.description ? `<div class="c-row"><span class="c-val" style="font-size:12px">${p.description.length>110?p.description.substring(0,110)+'…':p.description}</span></div>` : ''}
    ${total ? `<div class="next-box"><div class="next-row">
      <span class="next-lbl">Tasks</span>
      <span class="next-txt">${done} of ${total} complete (${pct}%)</span>
    </div></div>` : ''}
    ${nextLbl ? `<div class="inst-row"><span class="inst-lbl">Next:</span>&nbsp;<span class="dpill ${nextCls}">${nextLbl}</span></div>` : ''}
    <div class="c-foot">
      <span class="ppill ${pCls}">${priorityShort(pri)}</span>
      ${open ? `<span style="color:var(--text3)">${open} open task${open>1?'s':''}</span>` : '<span style="color:var(--text3)">No open tasks</span>'}
    </div>
  </div>`;
}

// ── Task List ──────────────────────────────────────────────────────────────
let taskTab = 'open'; // 'open' | 'completed'

function setTaskTab(tab) {
  taskTab = tab;
  $('tktab-open').classList.toggle('on', tab === 'open');
  $('tktab-completed').classList.toggle('on', tab === 'completed');
  $('tk-scope').style.display     = tab === 'open'      ? '' : 'none';
  $('tk-daterange').style.display = tab === 'completed' ? '' : 'none';
  renderTasks();
}

// Returns {start, end} Date objects for a date range key
function dateRangeBounds(key) {
  const now = new Date(); now.setHours(23,59,59,999);
  if (!key || key === 'all') return {start: null, end: null};
  if (/^\d+$/.test(key)) {
    const start = new Date(); start.setDate(start.getDate() - parseInt(key)); start.setHours(0,0,0,0);
    return {start, end: now};
  }
  // Quarters use current calendar year
  const y = new Date().getFullYear();
  const qMap = {q1:[0,0,2,31], q2:[3,1,5,30], q3:[6,1,8,30], q4:[9,1,11,31]};
  const [sm,sd,em,ed] = qMap[key];
  return {start: new Date(y,sm,sd,0,0,0,0), end: new Date(y,em,ed,23,59,59,999)};
}

function renderTasks() {
  renderStats();
  const scope   = $('tk-scope')?.value    || 'all';
  const drKey   = $('tk-daterange')?.value || 'all';
  const sortBy  = $('tk-sort')?.value     || 'due';
  const groupBy = $('tk-group')?.value    || 'none';
  const pOrd_old = {High:0,Medium:1,Low:2};
  const pOrd_new = {P1:0,P2:1,P3:2,None:3};
  const sOrd    = {Prospect:0,Active:1,Proposal:2,'New Request':3,Customer:4,'On Hold':5,Won:6};
  const {start: drStart, end: drEnd} = dateRangeBounds(drKey);

  // Pull from BOTH customer records and projects (unified view)
  // Each item: {ref, refType:'customer'|'project', t}
  const allItems = taskTab === 'completed'
    ? allCompletedTasks()
    : allOpenTasks();
  const qSrch = ($('srch')?.value || '').toLowerCase().trim();

  // Apply filters
  let items = [];
  allItems.forEach(item => {
    const {ref, refType, t} = item;
    // Search filter
    if (qSrch) {
      const ctx = refType === 'customer'
        ? `${ref.company||''} ${ref.name||''} ${ref.accountNumber||''} ${ref.chainNumber||''}`
        : `${ref.title||''} ${ref.category||''} ${ref.description||''}`;
      const hay = `${t.title} ${ctx}`.toLowerCase();
      if (!hay.includes(qSrch)) return;
    }
    if (taskTab === 'completed') {
      if (drStart) {
        const d = pDate(t.doneDate || t.due);
        if (!d || d < drStart || d > drEnd) return;
      }
    } else {
      // OPEN tab: hide P3 by default unless scope is 'parking'
      const tp = taskPriority(t);
      if (scope === 'parking') { if (tp !== 'P3') return; }
      else                     { if (tp === 'P3') return; }

      if (scope === 'due7')   { const x=dDiff(t.due); if(x===null||x>7||x<0)return; }
      if (scope === 'due30')  { const x=dDiff(t.due); if(x===null||x>30||x<0)return; }
      if (scope === 'over')   { if(dStat(t.due)!=='over')return; }
      if (scope === 'nodate') { if(t.due)return; }
      if (scope === 'install'){ if(refType!=='customer' || !ref.installDate)return; }
      if (scope === 'p1')     { if (tp !== 'P1') return; }
      if (scope === 'p2')     { if (tp !== 'P2') return; }
    }
    items.push(item);
  });

  items.sort((a,b) => {
    if (sortBy==='due')        { const da=pDate(a.t.due),db=pDate(b.t.due); if(da&&db)return da-db; return da?-1:db?1:0; }
    if (sortBy==='priority')   { return (pOrd_new[taskPriority(a.t)]??9)-(pOrd_new[taskPriority(b.t)]??9); }
    if (sortBy==='install')    {
      const ai = a.refType==='customer'?a.ref.installDate:'';
      const bi = b.refType==='customer'?b.ref.installDate:'';
      const da=pDate(ai),db=pDate(bi); if(da&&db)return da-db; return da?-1:db?1:0;
    }
    if (sortBy==='company')    {
      const an = a.refType==='customer'?a.ref.company:a.ref.title;
      const bn = b.refType==='customer'?b.ref.company:b.ref.title;
      return (an||'').localeCompare(bn||'');
    }
    if (sortBy==='stage')      {
      const as = a.refType==='customer'?a.ref.stage:'Project';
      const bs = b.refType==='customer'?b.ref.stage:'Project';
      return (sOrd[as]??9)-(sOrd[bs]??9);
    }
    return 0;
  });

  const thead = `<thead><tr>
    <th>Source</th><th>Stage / Type</th><th>Task</th>
    <th>Due Date</th><th>Install / Project</th><th>Priority</th><th></th>
  </tr></thead>`;

  function tkRow({ref, refType, t}) {
    const ds   = dStat(t.due);
    const dl   = dLbl(t.due);
    const dCls = ds==='over'?'due-over':ds==='soon'?'due-soon':'due-ok';
    const rowCls = t.done?'':(ds==='over'?'tk-over':ds==='soon'?'tk-soon':'');
    const tp = taskPriority(t);
    const pCls = priorityClass(tp);

    if (refType === 'customer') {
      const r = ref;
      const iDiff= dDiff(r.installDate);
      const iDs  = dStat(r.installDate);
      const iCls = iDs==='over'?'due-over':iDs==='soon'?'due-soon':'due-ok';
      const isA  = r.type==='account';
      return `<tr class="${rowCls}" style="${t.done?'opacity:.5':''}" onclick="openDetail(${r.id})">
        <td><div class="tk-co">${r.company}</div><span class="${isA?'b-acc':'b-pro'} tk-type">${isA?'Account':'Prospect'}</span></td>
        <td><span class="bdg ${scls(r.stage)}">${r.stage}</span></td>
        <td><div class="tk-title" style="${t.done?'text-decoration:line-through;color:var(--text3)':''}">${t.title}</div></td>
        <td>
          ${dl&&!t.done?`<div class="tk-due-big"><span class="dpill ${dCls}">${dl}</span></div><div class="tk-due-rel">${fDate(t.due)}</div>`
            :t.due?`<span style="font-size:11px;color:var(--text3)">${fDate(t.due)}</span>`
            :'<span style="color:var(--text3);font-size:12px">—</span>'}
        </td>
        <td>
          ${r.installDate?`<div><span class="dpill ${iCls}" style="font-size:11px">${fDate(r.installDate)}</span></div>${iDiff!==null?`<div class="tk-due-rel">${iDiff<0?'Overdue':iDiff===0?'Today':iDiff+'d away'}</div>`:''}`
            :'<span style="color:var(--text3);font-size:12px">—</span>'}
        </td>
        <td><span class="ppill ${pCls}">${priorityShort(tp)}</span></td>
        <td onclick="event.stopPropagation()">
          <button class="tsbtn" onclick="toggleTask(${r.id},'${t.id}')">${t.done?'Reopen':'✓ Done'}</button>
        </td>
      </tr>`;
    } else {
      // Project task
      const p = ref;
      const stCls = p.status === 'Complete' ? 'st-co' : p.status === 'In Progress' ? 'st-ip' : 'st-ns';
      return `<tr class="${rowCls}" style="${t.done?'opacity:.5':''}" onclick="openProjectDetail('${p.id}')">
        <td><div class="tk-co">${p.title}</div><span class="b-prj tk-type">🗂 Project${p.category?' · '+p.category:''}</span></td>
        <td><span class="${stCls}">${p.status||'Not Started'}</span></td>
        <td><div class="tk-title" style="${t.done?'text-decoration:line-through;color:var(--text3)':''}">${t.title}</div></td>
        <td>
          ${dl&&!t.done?`<div class="tk-due-big"><span class="dpill ${dCls}">${dl}</span></div><div class="tk-due-rel">${fDate(t.due)}</div>`
            :t.due?`<span style="font-size:11px;color:var(--text3)">${fDate(t.due)}</span>`
            :'<span style="color:var(--text3);font-size:12px">—</span>'}
        </td>
        <td><span style="font-size:11px;color:var(--text2)">Project task</span></td>
        <td><span class="ppill ${pCls}">${priorityShort(tp)}</span></td>
        <td onclick="event.stopPropagation()">
          <button class="tsbtn" onclick="toggleProjectTask('${p.id}','${t.id}')">${t.done?'Reopen':'✓ Done'}</button>
        </td>
      </tr>`;
    }
  }

  let tbody = '<tbody>';
  if (groupBy === 'none') {
    tbody += items.length
      ? items.map(tkRow).join('')
      : '<tr><td colspan="7" class="tk-empty">No tasks match the current filter.</td></tr>';
  } else {
    const gf = {
      urgency:  ({t}) => { const ds=dStat(t.due); return ds==='over'?'🔴 Overdue':ds==='soon'?'🟡 Due Soon':'🟢 Upcoming'; },
      stage:    ({ref,refType}) => refType==='customer'?ref.stage:'🗂 Project',
      priority: ({t}) => priorityLabel(taskPriority(t)),
      type:     ({ref,refType}) => refType==='customer'
                                   ? (ref.type==='account'?'My Accounts':'Prospects')
                                   : '🗂 Projects'
    }[groupBy];
    const groups = {};
    items.forEach(item => { const k=gf(item); if(!groups[k])groups[k]=[]; groups[k].push(item); });
    if (!Object.keys(groups).length) {
      tbody += '<tr><td colspan="7" class="tk-empty">No tasks match the current filter.</td></tr>';
    } else {
      Object.entries(groups).forEach(([k,arr]) => {
        tbody += `<tr class="tk-grp"><td colspan="7">${k}<span class="tk-cnt">${arr.length}</span></td></tr>`;
        tbody += arr.map(tkRow).join('');
      });
    }
  }
  tbody += '</tbody>';
  $('tkt').innerHTML = thead + tbody;
}

// Toggle a collapsible section in the detail modal
function toggleSection(id) {
  const el = $(id);
  if (!el) return;
  const toggleBtn = $(id + '-toggle');
  const visible = el.style.display !== 'none';
  el.style.display = visible ? 'none' : '';
  if (toggleBtn) toggleBtn.textContent = visible ? 'Show ▾' : 'Hide ▴';
}

// ── Open a record or project in a new browser tab ──────────────────────────
// Builds a URL with a query parameter (e.g. ?record=42 or ?project=pj3)
// When that URL is opened, the init code below will auto-open the detail modal.
function openInNewTab(kind, id) {
  const base = location.origin + location.pathname;
  const param = kind === 'record' ? 'record' : 'project';
  const url = base + '?' + param + '=' + encodeURIComponent(id);
  window.open(url, '_blank');
}

// Check the URL on load and auto-open the matching detail modal.
// This runs after init so REC/PRJ are already populated.
function autoOpenFromURL() {
  try {
    const params = new URLSearchParams(window.location.search);
    const recId = params.get('record');
    const prjId = params.get('project');
    if (recId) {
      const id = parseInt(recId);
      if (REC.find(x => x.id === id)) {
        setTimeout(() => openDetail(id), 200);
      }
    } else if (prjId) {
      if (PRJ.find(x => x.id === prjId)) {
        setTimeout(() => openProjectDetail(prjId), 200);
      }
    }
  } catch(e) { console.warn('autoOpenFromURL error:', e); }
}

function saveContact(recId) {
  const r = REC.find(x => x.id === recId); if (!r) return;
  const c = {
    id: 'c' + Date.now() + Math.floor(Math.random()*1000),
    name:     $('cc-name')?.value.trim() || '',
    position: $('cc-pos')?.value.trim()  || '',
    email:    $('cc-email')?.value.trim()|| '',
    phone:    $('cc-phone')?.value.trim()|| '',
    notes:    $('cc-notes')?.value.trim()|| '',
  };
  if (!c.name && !c.email && !c.phone) {
    alert('Please provide at least a name, email, or phone.');
    return;
  }
  if (!r.contacts) r.contacts = [];
  r.contacts.push(c);
  save();
  closeModal('ov-pdf');
  openDetail(recId);
  // Re-expand the contacts section after redraw
  setTimeout(() => toggleSection('contacts-'+recId), 60);
}
function deleteContact(recId, cId) {
  if (!confirm('Remove this contact?')) return;
  const r = REC.find(x => x.id === recId); if (!r) return;
  r.contacts = (r.contacts || []).filter(x => x.id !== cId);
  save(); openDetail(recId);
  setTimeout(() => toggleSection('contacts-'+recId), 60);
}

// ── Action Plan helpers ────────────────────────────────────────────────────
const AP_SECTIONS = [
  {key: 'overview',     title: 'Overview'},
  {key: 'current',      title: 'Current State'},
  {key: 'actions',      title: 'Action Items'},
  {key: 'risks',        title: 'Risks'},
  {key: 'opportunities',title: 'Opportunities'}
];
function renderActionPlan(r) {
  const ap = r.actionPlan || {};
  let html = '';
  AP_SECTIONS.forEach(sec => {
    const entries = ap[sec.key] || [];
    html += `<div class="ap-section">
      <div class="ap-shdr">
        <span class="ap-stitle">${sec.title}</span>
        <span class="ap-scnt">${entries.length} entr${entries.length===1?'y':'ies'}</span>
      </div>
      ${entries.map(e => apEntryHTML(r.id, sec.key, e)).join('')}
      <div class="ap-add">
        <input type="text" id="ap-title-${r.id}-${sec.key}" placeholder="Entry title (e.g. 'Q3 Equipment Review')">
        <button class="abtn" onclick="addAPEntry(${r.id},'${sec.key}')">+ Add</button>
        <textarea id="ap-body-${r.id}-${sec.key}" placeholder="Details for this entry… press Add to save"></textarea>
      </div>
    </div>`;
  });
  return html;
}
function apEntryHTML(recId, secKey, e) {
  return `<div class="ap-entry">
    <div class="ape-head">
      <div class="ape-title">${escHtml(e.title || 'Untitled')}</div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        ${e.date?`<span class="ape-date">${fDate(e.date)}</span>`:''}
        <button class="ape-del" onclick="deleteAPEntry(${recId},'${secKey}','${e.id}')" title="Delete">×</button>
      </div>
    </div>
    ${e.body?`<div class="ape-body">${escHtml(e.body)}</div>`:''}
  </div>`;
}
function addAPEntry(recId, secKey) {
  const ti = $('ap-title-'+recId+'-'+secKey);
  const bi = $('ap-body-'+recId+'-'+secKey);
  const title = ti ? ti.value.trim() : '';
  const body  = bi ? bi.value.trim() : '';
  if (!title && !body) return;
  const r = REC.find(x => x.id === recId); if (!r) return;
  if (!r.actionPlan) r.actionPlan = {};
  if (!r.actionPlan[secKey]) r.actionPlan[secKey] = [];
  const now = new Date();
  const isoDate = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  r.actionPlan[secKey].push({
    id: 'e' + Date.now() + Math.floor(Math.random()*1000),
    title: title || 'Untitled',
    body,
    date: isoDate
  });
  save();
  openDetail(recId);
  setTimeout(() => toggleSection('actionplan-'+recId), 60);
}
function deleteAPEntry(recId, secKey, eId) {
  if (!confirm('Delete this entry?')) return;
  const r = REC.find(x => x.id === recId); if (!r) return;
  if (!r.actionPlan || !r.actionPlan[secKey]) return;
  r.actionPlan[secKey] = r.actionPlan[secKey].filter(x => x.id !== eId);
  save(); openDetail(recId);
  setTimeout(() => toggleSection('actionplan-'+recId), 60);
}

// Manual priority override on a task — works for both customer and project tasks
function editTaskPriority(recId, taskId) {
  // Try customer first
  let owner = REC.find(x => x.id === recId);
  let isProject = false;
  if (!owner) {
    owner = PRJ.find(x => x.id === String(recId));
    isProject = true;
  }
  if (!owner) return;
  const t = (owner.tasks||[]).find(x => x.id === taskId);
  if (!t) return;

  const current = t.priorityOverride || '';
  const choice = prompt(
    'Set manual priority override (P1, P2, P3, None) — or leave blank for AUTO based on due date.\n\n' +
    'Current: ' + (current || 'AUTO ('+autoPriority(t)+')'),
    current
  );
  if (choice === null) return; // cancelled
  const c = choice.trim().toUpperCase();
  if (c === '' || c === 'AUTO') {
    delete t.priorityOverride;
  } else if (['P1','P2','P3','NONE'].includes(c)) {
    t.priorityOverride = c === 'NONE' ? 'None' : c;
  } else {
    alert('Invalid choice. Use P1, P2, P3, None, or leave blank.');
    return;
  }
  save();
  if (isProject) {
    if ($('ov-main').classList.contains('show')) openProjectDetail(owner.id);
  } else {
    if ($('ov-main').classList.contains('show')) openDetail(owner.id);
  }
  render();
}
function addTask(recId) {
  const ti = $('nt-title-'+recId), di = $('nt-due-'+recId);
  const ru = $('nt-rec-unit-'+recId), rc = $('nt-rec-count-'+recId);
  const title = ti ? ti.value.trim() : ''; if (!title) return;
  const r = REC.find(x => x.id === recId); if (!r) return;
  if (!r.tasks) r.tasks = [];
  const newTask = {id: tid(), title, due: di ? di.value || '' : '', done: false};
  const unit  = ru ? ru.value.trim() : '';
  const count = rc ? parseInt(rc.value || '0') : 0;
  if (unit && count && count >= 1) {
    newTask.recurrence = {unit, count};
  }
  r.tasks.push(newTask);
  save(); openDetail(recId); render();
}
function toggleTask(recId, taskId) {
  const r = REC.find(x => x.id === recId); if (!r) return;
  const t = (r.tasks||[]).find(x => x.id === taskId); if (!t) return;
  t.done = !t.done;
  if (t.done) {
    const now = new Date();
    t.doneDate = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    // Recurrence: spawn the next occurrence (due = completion + interval)
    if (t.recurrence && t.recurrence.unit && t.recurrence.count) {
      const nextDue = nextRecurrenceDate(t.doneDate, t.recurrence);
      if (nextDue) {
        r.tasks.push({
          id: tid(),
          title: t.title,
          due: nextDue,
          done: false,
          recurrence: {unit: t.recurrence.unit, count: t.recurrence.count},
          spawnedFrom: t.id
        });
      }
    }
  } else {
    delete t.doneDate;
  }
  save();
  if ($('ov-main').classList.contains('show')) openDetail(recId);
  render();
}
function deleteTask(recId, taskId) {
  const r = REC.find(x => x.id === recId); if (!r) return;
  r.tasks = (r.tasks||[]).filter(t => t.id !== taskId);
  save(); openDetail(recId); render();
}
function toggleShowDone(recId) {
  const list = $('tlist-'+recId); if (!list) return;
  const doneItems = [...list.querySelectorAll('.titem[data-done="true"]')];
  const anyHidden = doneItems.some(el => el.style.display === 'none');
  doneItems.forEach(el => el.style.display = anyHidden ? '' : 'none');
  const btn = $('sd-btn-'+recId);
  if (btn) btn.textContent = anyHidden ? 'Hide completed' : 'Show completed';
}
async function delRec(id) {
  const r = REC.find(x => x.id === id);
  if (!r) return;
  const kids = getChildren(id);
  if (kids.length > 0) {
    const choice = prompt(
      `This is a Chain Parent with ${kids.length} child location${kids.length>1?'s':''}.\n\n` +
      'Type one of:\n' +
      '   UNLINK  — delete parent only, children become standalone\n' +
      '   DELETE  — delete parent AND all children (cannot be undone)\n' +
      '   CANCEL  — keep everything',
      'UNLINK'
    );
    if (!choice) return;
    const c = choice.trim().toUpperCase();
    if (c === 'UNLINK') {
      kids.forEach(k => { delete k.parentId; });
      REC = REC.filter(x => x.id !== id);
    } else if (c === 'DELETE') {
      const ids = new Set([id, ...kids.map(k=>k.id)]);
      REC = REC.filter(x => !ids.has(x.id));
    } else {
      return;
    }
    closeModal('ov-main'); render();
    await saveAndWait(); // AWAIT so we don't continue until push succeeds
    return;
  }
  if (confirm('Delete this record? This cannot be undone.')) {
    REC = REC.filter(x => x.id !== id);
    closeModal('ov-main'); render();
    await saveAndWait(); // AWAIT so the push actually happens
  }
}

function saveRec(id) {
  const chk = $('ct-chk')?.checked;
  const parentVal = $('f-parent') ? $('f-parent').value : '';
  const v = {
    type:      $('f-type').value,
    company:   $('f-co').value.trim(),
    stage:     $('f-stage').value,
    priority:  $('f-pri').value,
    value:     $('f-val').value.trim(),
    holdReason:$('f-hold') ? $('f-hold').value.trim() : '',
    prospectStep: ($('f-type').value === 'prospect' && $('f-pstep')) ? $('f-pstep').value : '',
    accountNumber: $('f-acctno') ? $('f-acctno').value.trim() : '',
    chainNumber:   $('f-chainno') ? $('f-chainno').value.trim() : '',
    parentId:      parentVal === '' ? null : parseInt(parentVal),
    need:      $('f-need').value.trim(),
    installDate:$('f-inst').value || '',
    serviceType: $('f-svc') ? $('f-svc').value : '',
    address:     $('f-addr') ? $('f-addr').value.trim() : '',
    name:    chk ? $('f-name')?.value.trim()    || '' : '',
    owner:   chk ? $('f-owner')?.value.trim()   || '' : '',
    contact: chk ? $('f-contact')?.value.trim() || '' : '',
    phone:   chk ? $('f-phone')?.value.trim()   || '' : ''
  };
  if (!v.company) { alert('Company / Location name is required.'); return; }
  // Determine previous prospect step (for auto-task generation)
  let prevStep = '';
  if (id !== 'null' && id !== null) {
    const existing = REC.find(x => x.id === id);
    if (existing) prevStep = existing.prospectStep || '';
  }
  let newRec;
  if (id === 'null' || id === null) {
    newRec = {id: NID++, ...v, tasks: []};
    REC.unshift(newRec);
  } else {
    const r = REC.find(x => x.id === id);
    const tasks = r.tasks || [];
    Object.assign(r, v);
    r.tasks = tasks;
    newRec = r;
  }
  // Auto-generate tasks when prospect step CHANGES to a trigger step
  if (v.type === 'prospect' && v.prospectStep && v.prospectStep !== prevStep) {
    autoGenStepTasks(newRec, v.prospectStep);
  }
  save(); closeModal('ov-main'); render();
}

function addDaysISO(days) {
  const d = new Date(TODAY); d.setDate(d.getDate() + days);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function autoGenStepTasks(rec, step) {
  if (!rec.tasks) rec.tasks = [];
  // Map step -> {title, daysOut}
  const map = {
    'CRF Complete and Submitted':        {title:'Follow up on CRF submission', days:5},
    'Equipment Ordered/Account Set up':  {title:'Confirm equipment delivery & account setup', days:7},
    'Agreement Executed':                {title:'CLOSE WON account', days:2}
  };
  const cfg = map[step]; if (!cfg) return;
  const due = addDaysISO(cfg.days);
  // Avoid duplicate: if an open task with same title already exists, skip
  const dup = rec.tasks.some(t => !t.done && t.title === cfg.title && t.autoStep === step);
  if (dup) return;
  rec.tasks.push({id: tid(), title: cfg.title, due, done:false, autoStep: step});
}

function doPrint() {
  const sortBy = $('ps').value, scope = $('pi').value, groupBy = $('pg').value;

  let list = REC.filter(r => {
    if (scope==='account')  return r.type==='account';
    if (scope==='prospect') return r.type==='prospect';
    if (scope==='due7')     return openTasks(r).some(t=>{const x=dDiff(t.due);return x!==null&&x<=7&&x>=0;});
    if (scope==='hold')     return r.stage==='On Hold';
    if (scope==='request')  return r.type==='account'&&r.stage==='New Request';
    if (scope==='install')  return !!r.installDate;
    return true;
  });
  list = [...list].sort((a,b) => {
    if (sortBy==='due')      { const sa=soonest(a),sb=soonest(b);const da=sa&&sa.due?pDate(sa.due):null,db=sb&&sb.due?pDate(sb.due):null;if(da&&db)return da-db;return da?-1:db?1:0; }
    if (sortBy==='install')  { const da=pDate(a.installDate),db=pDate(b.installDate);if(da&&db)return da-db;return da?-1:db?1:0; }
    if (sortBy==='company')  return a.company.localeCompare(b.company);
    if (sortBy==='priority') return (pOrd[a.priority]??9)-(pOrd[b.priority]??9);
    return 0;
  });
  const now = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const thead = `<thead><tr>
    <th style="width:16%">Company</th><th style="width:9%">Stage</th><th style="width:7%">Priority</th>

    <th style="width:20%">Next Task</th><th style="width:10%">Due Date</th><th style="width:9%">Install Date</th>
  </tr></thead>`;
  function rw(r) {
    const st=soonest(r), ot=openTasks(r);
    return `<tr>
      <td style="font-weight:600">${r.company}</td>
      <td><span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:${sbg(r.stage)};color:${sfg(r.stage)}">${r.stage}</span></td>

      <td style="font-size:10px">${r.need||'—'}</td>
      <td style="font-size:10px">${st?st.title+(ot.length>1?` (+${ot.length-1} more)`:''):'—'}</td>
      <td style="font-size:10px;white-space:nowrap">${st&&st.due?fDate(st.due):'—'}</td>
      <td style="font-size:10px;white-space:nowrap">${r.installDate?fDate(r.installDate):'—'}</td>
    </tr>`;
  }
  let body = '';
  if (groupBy === 'none') {
    body = `<table class="pt">${thead}<tbody>${list.map(rw).join('')}</tbody></table>`;
  } else {
    const gf = {type:r=>r.type==='account'?'My Accounts':'Prospects', stage:r=>r.stage, priority:r=>r.priority+' Priority'}[groupBy];
    const groups = {};
    list.forEach(r => { const k=gf(r); if(!groups[k])groups[k]=[]; groups[k].push(r); });
    body = Object.entries(groups).map(([k,rows]) =>
      `<div class="rpg">${k} (${rows.length})</div><table class="pt">${thead}<tbody>${rows.map(rw).join('')}</tbody></table>`
    ).join('');
  }
  $('print-area').innerHTML = `<div class="rph">Royal Cup — Sales Tracker Report</div><div class="rps">Generated ${now} · ${list.length} records</div>${body}`;
  closeModal('ov-pdf');
  setTimeout(() => window.print(), 200);
}

function doBackup() {

function doRestore(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.rec) throw new Error();
      if (confirm(`Replace all data with ${d.rec.length} records from backup?`)) {
        REC = d.rec; NID = d.nid||1; TID = d.tid||100; save(); render(); alert('Backup restored.');
      }
    } catch { alert('Could not read backup file.'); }
  };
  reader.readAsText(f); e.target.value = '';
}

// ── Excel Import ───────────────────────────────────────────────────────────
function xlImport(e) {
  const file = e.target.files[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const sheetName = wb.SheetNames.find(n => n.toLowerCase().includes('import') || n.toLowerCase().includes('template')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      let hRow = -1;
      for (let i = 0; i < Math.min(5, rows.length); i++) {
        if (rows[i].map(c=>String(c).toLowerCase()).some(c => c.includes('company') || c.includes('name'))) { hRow=i; break; }
      }
      if (hRow < 0) { alert('Could not find header row. Please use the import template.'); return; }
      const FM = {'type':'type','company':'company','company / location name':'company','location':'company',
        'stage':'stage','priority':'priority','value':'value','email':'contact','phone':'phone','owner':'owner',
        'need / request':'need','need':'need','next step':'nextStep','next step due':'nextDue',
        'install date':'installDate','desired install date':'installDate',
        'hold reason':'holdReason','contact name':'name',
        'account #':'accountNumber','account number':'accountNumber','acct #':'accountNumber','acct number':'accountNumber',
        'chain #':'chainNumber','chain number':'chainNumber',
        'parent':'parentName','parent / chain':'parentName','parent name':'parentName','chain':'parentName'};
      const headers = rows[hRow].map(h => String(h).replace(/[★*\s]+$/,'').trim().toLowerCase());
      const parsed = [], errors = [];
      rows.slice(hRow+1).forEach((row, ri) => {
        if (row.every(c => String(c).trim() === '')) return;
        const rec = {};
        headers.forEach((h, ci) => { const f=FM[h]; if(f) rec[f]=String(row[ci]||'').trim(); });
        const rowN = hRow + ri + 2;
        if (!rec.company) { errors.push(`Row ${rowN}: Company missing`); return; }
        rec.type = (rec.type||'').toLowerCase().includes('account') ? 'account' : 'prospect';
        const stages = ['prospect','active','proposal','won','lost','customer','on hold','new request'];
        const ms = stages.find(s => s === (rec.stage||'').toLowerCase());
        rec.stage = ms ? ms.replace(/\b\w/g,c=>c.toUpperCase()) : 'Prospect';
        const pr = (rec.priority||'').toLowerCase();
        rec.priority = pr.startsWith('h')?'High':pr.startsWith('l')?'Low':'Medium';
        ['nextDue','installDate'].forEach(f => {
          if (!rec[f]) { rec[f]=''; return; }
          const mm = rec[f].match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
          const yy = rec[f].match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (mm) rec[f] = `${mm[3]}-${mm[1].padStart(2,'0')}-${mm[2].padStart(2,'0')}`;
          else if (!yy) rec[f] = '';
        });
        parsed.push(rec);
      });
      pendingImport = parsed;
      showImportPreview(parsed, errors, file.name);
    } catch(err) { alert('Error reading file: ' + err.message); }
  };
  reader.readAsArrayBuffer(file); e.target.value = '';
}

    <div class="mfoot">

      ${parsed.length?`<button class="btn pri" onclick="confirmImport()">Import ${parsed.length} record${parsed.length!==1?'s':''}</button>`:''}
    </div>`;
  showOverlay('ov-import');

function confirmImport() {
  const mode = document.querySelector('input[name="im"]:checked')?.value || 'add';
  if (mode === 'replace') {
    if (!confirm(`Delete all ${REC.length} current records and replace? Cannot be undone.`)) return;
    REC = []; NID = 1; TID = 100;
  }
  // Build new records (without parent linking yet — that's a 2nd pass)
  const imp = pendingImport.map(r => {
    const tasks = [];
    if (r.nextStep) tasks.push({id:tid(), title:r.nextStep, due:r.nextDue||'', done:false});
    return {
      id: NID++,
      type: r.type, company: r.company, name: r.name||'', stage: r.stage,
      priority: r.priority, value: r.value||'',
      contact: r.contact||'', phone: r.phone||'', owner: r.owner||'',
      need: r.need||'', installDate: r.installDate||'',
      holdReason: r.holdReason||'',
      accountNumber: r.accountNumber||'',
      chainNumber:   r.chainNumber||'',
      _parentName:   r.parentName||'', // temp field for 2nd-pass resolution
      tasks
    };
  });
  REC = mode === 'replace' ? imp : [...imp, ...REC];

  // 2ND PASS: resolve _parentName -> parentId (case-insensitive, trimmed)
  let linkedCount = 0, unlinkedCount = 0;
  REC.forEach(r => {
    if (r._parentName) {
      const target = r._parentName.trim().toLowerCase();
      const par = REC.find(x => x.id !== r.id && x.company.trim().toLowerCase() === target);
      if (par) { r.parentId = par.id; linkedCount++; }
      else { unlinkedCount++; }
      delete r._parentName;
    }
  });

  save(); closeModal('ov-import'); render();
  let msg = `✓ Imported ${imp.length} record${imp.length!==1?'s':''} ${mode==='add'?'— added to existing data.':'— all data replaced.'}`;
  if (linkedCount > 0)   msg += `\n   ⛓ ${linkedCount} child record${linkedCount>1?'s':''} linked to parent.`;
  if (unlinkedCount > 0) msg += `\n   ⚠️ ${unlinkedCount} record${unlinkedCount>1?'s':''} had a Parent value that didn't match any existing record — left standalone.`;
  alert(msg);
}

// ── Sync diagnostics & recovery ────────────────────────────────────────────
async function runSyncDiagnostics() {
  const out = $('diag-output');
  if (!out) return;
  out.style.display = '';
  out.textContent = 'Running diagnostics...\n';

  const lines = [];
  lines.push('╔═══════════════════════════════════════════');
  lines.push('║ SYNC DIAGNOSTICS');
  lines.push('╚═══════════════════════════════════════════');
  lines.push('');
  lines.push('LOCAL STATE:');
  lines.push('  • REC count (in memory): ' + REC.length);
  lines.push('  • PRJ count (in memory): ' + PRJ.length);

  // Check localStorage
  try {
    const ls = JSON.parse(localStorage.getItem(STORE) || '{}');
    lines.push('  • REC count (localStorage): ' + (ls.rec ? ls.rec.length : 0));
    lines.push('  • PRJ count (localStorage): ' + (ls.prj ? ls.prj.length : 0));
  } catch(e) {
    lines.push('  • localStorage: ERROR parsing - ' + e.message);
  }

  lines.push('');
  lines.push('SYNC STATE:');
  lines.push('  • isOnline: ' + isOnline);
  lines.push('  • syncInFlight: ' + syncInFlight);
  lines.push('  • syncQueue length: ' + syncQueue.length);
  lines.push('  • last push ts: ' + (localStorage.getItem('rc_last_push_ts') || 'never'));
  if (localStorage.getItem('rc_last_push_ts')) {
    const pushDate = new Date(parseInt(localStorage.getItem('rc_last_push_ts')));
    lines.push('  • last push: ' + pushDate.toLocaleString());
  }
  lines.push('  • script URL: ' + (syncCfg.scriptUrl ? syncCfg.scriptUrl.substring(0,50)+'...' : 'not set'));

  out.textContent = lines.join('\n') + '\n\nFetching from Sheets...';

  // Now fetch from Sheets to compare
  try {
    const resp = await fetch(syncCfg.scriptUrl + '?action=get&cb=' + Date.now(), {redirect: 'follow'});
    const body = await resp.json();
    lines.push('');
    lines.push('REMOTE STATE (Google Sheets):');
    lines.push('  • HTTP status: ' + resp.status);
    lines.push('  • REC count (remote): ' + (body.rec ? body.rec.length : 0));
    lines.push('  • PRJ count (remote): ' + (body.prj ? body.prj.length : 0));
    lines.push('  • remote ts: ' + (body.ts || 'none'));
    if (body.ts) {
      const remoteDate = new Date(body.ts);
      lines.push('  • remote saved: ' + remoteDate.toLocaleString());
    }

    lines.push('');
    lines.push('COMPARISON:');
    const localCount = REC.length;
    const remoteCount = body.rec ? body.rec.length : 0;
    if (localCount === remoteCount) {
      lines.push('  ✓ Local and remote have SAME count (' + localCount + ')');
    } else {
      lines.push('  ⚠ MISMATCH: local=' + localCount + ', remote=' + remoteCount);
      lines.push('    Difference: ' + (localCount - remoteCount) + ' records');
      if (localCount < remoteCount) {
        lines.push('    → Remote has MORE records than local. Your deletes haven\'t pushed.');
        lines.push('    → Click "⚡ Force Push Local" to push your local state to Sheets.');
      } else {
        lines.push('    → Local has more records than remote. Something was added locally.');
      }
    }
  } catch(e) {
    lines.push('');
    lines.push('ERROR fetching from Sheets:');
    lines.push('  ' + e.message);
  }

  out.textContent = lines.join('\n');
}

async function forceResyncFromLocal() {
  if (!confirm('This will FORCE push your current local data to Google Sheets, overwriting whatever is there. Continue?')) return;
  const out = $('diag-output');
  if (out) { out.style.display = ''; out.textContent = 'Force pushing local state to Sheets...'; }
  try {
    const ts = Date.now();
    const payload = {rec: REC, nid: NID, tid: TID, prj: PRJ, pjid: PJID, cats: PROJECT_CATEGORIES, ts};
    await pushToSheets(payload);
    syncQueue = []; saveQueue();
    localStorage.setItem('rc_last_push_ts', String(ts));
    updateSyncStatus();
    if (out) out.textContent = '✓ SUCCESS! Pushed ' + REC.length + ' records and ' + PRJ.length + ' projects to Sheets.\n\nYour local data is now the source of truth.';
    alert('✓ Force push successful!');
  } catch(e) {
    if (out) out.textContent = '✗ FAILED: ' + e.message;
    alert('Force push failed: ' + e.message);
  }
}

function disconnectSync() {
  if (!confirm('Disconnect Google Sheets sync? Your local data will not be affected.')) return;

}

async function manualSync() {
  closeModal('ov-sync');

  syncQueue.push({ts: Date.now()});
  saveQueue();
  await flushQueue();
  updateSyncStatus();
  alert('✓ Data pushed to Google Sheets.');
}

// ── Task Export — Excel ────────────────────────────────────────────────────
function exportTasksXL() {
  if (typeof XLSX === 'undefined') { alert('Excel library not loaded.'); return; }
  const drKey  = $('tk-daterange')?.value || 'all';
  const scope  = $('tk-scope')?.value    || 'all';
  const {start: drStart, end: drEnd} = dateRangeBounds(drKey);
  const wb = XLSX.utils.book_new();

  // Build filtered task rows matching what's on screen
  function collectTasks(doneFilter) {
    const rows = [];
    REC.forEach(r => {
      (r.tasks||[]).forEach(t => {
        if (t.done !== doneFilter) return;
        if (doneFilter) {
          if (drStart) {
            const d = pDate(t.doneDate || t.due);
            if (!d || d < drStart || d > drEnd) return;
          }
        } else {
          if (scope === 'due7')   { const x=dDiff(t.due); if(x===null||x>7||x<0)return; }
          if (scope === 'due30')  { const x=dDiff(t.due); if(x===null||x>30||x<0)return; }
          if (scope === 'over')   { if(dStat(t.due)!=='over')return; }
          if (scope === 'nodate') { if(t.due)return; }
          if (scope === 'install'){ if(!r.installDate)return; }
        }
        rows.push({
          'Company': r.company,
          'Type': r.type==='account'?'Account':'Prospect',
          'Stage': r.stage,
          'Priority': r.priority,
          'Task': t.title,
          'Status': t.done ? 'Completed' : 'Open',
          'Due Date': t.due ? fDate(t.due) : '',
          'Completed Date': t.doneDate ? fDate(t.doneDate) : '',
          'Days Until Due': (!t.done && t.due) ? (dDiff(t.due)??'') : '',
          'Install Date': r.installDate ? fDate(r.installDate) : '',
          'Value': r.value||''
        });
      });
    });
    return rows;
  }

  const openRows = collectTasks(false);
  const doneRows = collectTasks(true);
  const allRows  = [...openRows, ...doneRows].sort((a,b)=>{
    const da=a['Due Date']?new Date(a['Due Date']):null,db=b['Due Date']?new Date(b['Due Date']):null;
    if(da&&db)return da-db; return da?-1:db?1:0;
  });

  const cols = [{wch:26},{wch:10},{wch:13},{wch:10},{wch:45},{wch:10},{wch:14},{wch:14},{wch:13},{wch:14},{wch:12}];

  if (taskTab === 'open' && openRows.length) {
    const ws = XLSX.utils.json_to_sheet(openRows); ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb, ws, 'Open Tasks');
  } else if (taskTab === 'completed' && doneRows.length) {
    const ws = XLSX.utils.json_to_sheet(doneRows); ws['!cols']=cols;
    XLSX.utils.book_append_sheet(wb, ws, 'Completed Tasks');
  } else {
    if (openRows.length) { const ws=XLSX.utils.json_to_sheet(openRows); ws['!cols']=cols; XLSX.utils.book_append_sheet(wb,ws,'Open Tasks'); }
    if (doneRows.length) { const ws=XLSX.utils.json_to_sheet(doneRows); ws['!cols']=cols; XLSX.utils.book_append_sheet(wb,ws,'Completed Tasks'); }
  }
  if (!wb.SheetNames.length) { alert('No tasks match the current filter.'); return; }
  XLSX.writeFile(wb, 'RoyalCup_Tasks_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

    }

  save(); closeModal('ov-main'); render();
}

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div style="flex:1;min-width:0">
        <div style="font-size:18px;font-weight:600;letter-spacing:-.3px">${escHtml(p.title)}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="b-prj">🗂 Project</span>
          <span class="${stCls}">${p.status||'Not Started'}</span>
          <span class="ppill ${pCls}">${priorityShort(pri)}</span>
          ${p.category?`<span style="font-size:11px;color:var(--text2)">${escHtml(p.category)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn" onclick="openInNewTab('project','${p.id}')" title="Open this project in a new tab" style="padding:0 10px">↗</button>
        <button class="btn" onclick="closeModal('ov-main')">✕</button>
      </div>
    </div>
    ${p.description?`<div class="dbox" style="margin-bottom:10px"><div class="dl">Description</div><div style="font-size:13px;line-height:1.6;margin-top:3px">${escHtml(p.description)}</div></div>`:''}
    ${p.dueDate?`<div class="dbox navy" style="margin-bottom:10px">
      <div class="dl">Due Date</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <span style="font-size:14px;font-weight:600">${fDate(p.dueDate)}</span>
        ${(()=>{const d=dDiff(p.dueDate);return d===null?'':`<span class="dpill ${dpCls(p.dueDate)}">${d<0?'Overdue '+Math.abs(d)+'d':d===0?'Today':d+'d away'}</span>`;})()}
      </div>
    </div>`:''}
    ${total?`<div class="dbox" style="margin-bottom:10px">
      <div class="dl">Progress</div>
      <div style="margin-top:6px"><div style="background:var(--surf3);border-radius:8px;height:8px;overflow:hidden;width:100%">
        <div style="background:var(--grn);height:100%;width:${pct}%;transition:width .3s"></div>
      </div></div>
      <div style="font-size:12px;color:var(--text2);margin-top:5px">${done.length} of ${total} tasks complete (${pct}%)</div>
    </div>`:''}
    ${p.notes?`<div class="dbox gold" style="margin-bottom:10px"><div class="dl">Notes / Pick Up Point</div><div style="font-size:13px;line-height:1.6;margin-top:3px;white-space:pre-wrap">${escHtml(p.notes)}</div></div>`:''}

    <div>
      <div class="task-hdr">
        <span class="task-hdr-lbl">Sub-tasks</span>
        <span class="show-done" id="psd-${p.id}" onclick="toggleProjectShowDone('${p.id}')">${done.length>0?'Show completed':'No completed tasks'}</span>
      </div>
      <div class="task-list" id="ptlist-${p.id}">
        ${(p.tasks||[]).map(t => projectTaskItemHTML(p.id, t)).join('')}
        ${!(p.tasks||[]).length?'<div style="font-size:12px;color:var(--text3);padding:6px 0">No tasks yet. Add one below.</div>':''}
      </div>
      <div class="add-task" style="margin-top:8px;flex-wrap:wrap">
        <input type="text" id="pnt-title-${p.id}" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addProjectTask('${p.id}')" style="flex:1;min-width:140px">
        <input type="date" id="pnt-due-${p.id}" title="Due date (optional)">
        <input type="number" id="pnt-rec-count-${p.id}" min="1" max="99" placeholder="#" style="width:48px;height:30px;font-size:12px;padding:0 6px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none" title="Repeat every N units (optional)">
        <select id="pnt-rec-unit-${p.id}" style="height:30px;font-size:12px;padding:0 6px;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf);color:var(--text);font-family:var(--font);outline:none" title="Recurrence unit">
          <option value="">No repeat</option>
          <option value="days">Day(s)</option>
          <option value="weeks">Week(s)</option>
          <option value="months">Month(s)</option>
        </select>
        <button class="abtn" onclick="addProjectTask('${p.id}')">+ Add task</button>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="openEditProject('${p.id}')">Edit project</button>
      <button class="btn amb" onclick="printProjectPDF('${p.id}')">📄 PDF Snapshot</button>
      <button class="btn danger" onclick="delProject('${p.id}')">Delete</button>
    </div>`;
  showOverlay('ov-main');
}

function projectTaskItemHTML(pjId, t) {
  const tp = taskPriority(t);
  const pCls = priorityClass(tp);
  const dp = t.due && !t.done ? `<span class="tdp ${dpCls(t.due)}">${dLbl(t.due)||fDate(t.due)}</span>` : (t.due&&t.done?`<span style="font-size:10px;color:var(--text3)">${fDate(t.due)}</span>`:'');
  const recLbl = recurrenceLabel(t.recurrence);
  const recBadge = recLbl
    ? `<span style="font-size:10px;font-weight:600;color:#5C7BBF;background:#E8EDF5;border:1px solid #B0C0E0;padding:1px 7px;border-radius:20px;cursor:pointer;white-space:nowrap" onclick="event.stopPropagation();editTaskRecurrence('project','${pjId}','${t.id}')" title="${recLbl} — click to edit">🔁 ${recurrenceShort(t.recurrence)}</span>`
    : `<span style="font-size:10px;color:var(--text3);cursor:pointer;border:1px dashed var(--bdr);padding:1px 6px;border-radius:20px" onclick="event.stopPropagation();editTaskRecurrence('project','${pjId}','${t.id}')" title="Set recurrence">🔁</span>`;
  return `<div class="titem${t.done?' done':''}" id="pti-${t.id}" data-done="${t.done}">
    <input type="checkbox" ${t.done?'checked':''} onclick="toggleProjectTask('${pjId}','${t.id}')">
    <span class="tt">${escHtml(t.title)}</span>
    <span class="ppill ${pCls}" style="font-size:9px">${priorityShort(tp)}</span>
    ${recBadge}
    ${dp}
    <button class="tdel" onclick="deleteProjectTask('${pjId}','${t.id}')" title="Remove">×</button>
  </div>`;
}

function addProjectTask(pjId) {
  const ti = $('pnt-title-'+pjId), di = $('pnt-due-'+pjId);
  const ru = $('pnt-rec-unit-'+pjId), rc = $('pnt-rec-count-'+pjId);
  const title = ti ? ti.value.trim() : ''; if (!title) return;
  const p = PRJ.find(x => x.id === pjId); if (!p) return;
  if (!p.tasks) p.tasks = [];
  const newTask = {id: tid(), title, due: di ? di.value || '' : '', done: false};
  const unit  = ru ? ru.value.trim() : '';
  const count = rc ? parseInt(rc.value || '0') : 0;
  if (unit && count && count >= 1) {
    newTask.recurrence = {unit, count};
  }
  p.tasks.push(newTask);
  if (p.status === 'Not Started') p.status = 'In Progress';
  save(); openProjectDetail(pjId); render();
}

function toggleProjectTask(pjId, taskId) {
  const p = PRJ.find(x => x.id === pjId); if (!p) return;
  const t = (p.tasks||[]).find(x => x.id === taskId); if (!t) return;
  t.done = !t.done;
  if (t.done) {
    const now = new Date();
    t.doneDate = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    // Recurrence: spawn the next occurrence
    if (t.recurrence && t.recurrence.unit && t.recurrence.count) {
      const nextDue = nextRecurrenceDate(t.doneDate, t.recurrence);
      if (nextDue) {
        p.tasks.push({
          id: tid(),
          title: t.title,
          due: nextDue,
          done: false,
          recurrence: {unit: t.recurrence.unit, count: t.recurrence.count},
          spawnedFrom: t.id
        });
      }
    }
    // If all tasks done, auto-mark project Complete (only check after recurrence push)
    if ((p.tasks||[]).every(x => x.done)) p.status = 'Complete';
  } else {
    delete t.doneDate;
    if (p.status === 'Complete') p.status = 'In Progress';
  }
  save();
  if ($('ov-main').classList.contains('show')) openProjectDetail(pjId);
  render();
}

function deleteProjectTask(pjId, taskId) {
  const p = PRJ.find(x => x.id === pjId); if (!p) return;
  p.tasks = (p.tasks||[]).filter(t => t.id !== taskId);
  save(); openProjectDetail(pjId); render();
}

function toggleProjectShowDone(pjId) {
  const list = $('ptlist-'+pjId); if (!list) return;
  const doneItems = [...list.querySelectorAll('.titem[data-done="true"]')];
  const anyHidden = doneItems.some(el => el.style.display === 'none');
  doneItems.forEach(el => el.style.display = anyHidden ? '' : 'none');
  const btn = $('psd-'+pjId);
  if (btn) btn.textContent = anyHidden ? 'Hide completed' : 'Show completed';
}

async function delProject(id) {
  if (confirm('Delete this project? This cannot be undone.')) {
    PRJ = PRJ.filter(x => x.id !== id);
    closeModal('ov-main'); render();
    await saveAndWait();
  }
}

// ── Project PDF Snapshot ────────────────────────────────────────────────────
function printProjectPDF(id) {
  const p = PRJ.find(x => x.id === id); if (!p) return;
  const now = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const open = projectOpenTasks(p);
  const done = projectCompletedTasks(p);
  const total = open.length + done.length;
  const pct = total ? Math.round((done.length/total)*100) : 0;
  const pri = projectPriority(p);

  function tRows(tasks, isDone) {
    if (!tasks.length) return `<tr><td colspan="3" style="color:#999;font-style:italic;font-size:10px;padding:5px 7px">None</td></tr>`;
    return tasks.map(t => {
      const tp = taskPriority(t);
      const ds = dStat(t.due);
      const dueCls = isDone ? 'color:#1A7A52' : (ds==='over'?'color:#B83030':ds==='soon'?'color:#9A6B00':'');
      return `<tr>
        <td style="font-size:10px;padding:4px 7px;${isDone?'text-decoration:line-through;color:#999':''}">${escHtml(t.title)} <span style="font-size:9px;color:#666">[${tp}]</span></td>
        <td style="font-size:10px;padding:4px 7px;white-space:nowrap;${dueCls}">${t.due?fDate(t.due):'—'}</td>
        <td style="font-size:10px;padding:4px 7px;white-space:nowrap;color:#1A7A52">${t.doneDate?fDate(t.doneDate):isDone?'✓':''}</td>
      </tr>`;
    }).join('');
  }

  $('print-area').innerHTML = `
    <div class="rph">${escHtml(p.title)}</div>
    <div class="rps">
      Project Snapshot · Generated ${now}
      &nbsp;·&nbsp; ${p.status||'Not Started'}
      &nbsp;·&nbsp; ${pri}
      ${p.category ? '&nbsp;·&nbsp; '+escHtml(p.category) : ''}
    </div>

    <table class="pt" style="margin-bottom:10px">
      <thead><tr><th style="width:25%">Field</th><th>Details</th></tr></thead>
      <tbody>
        ${p.description?`<tr><td style="font-weight:600">Description</td><td>${escHtml(p.description)}</td></tr>`:''}
        ${p.dueDate?`<tr><td style="font-weight:600">Due Date</td><td>${fDate(p.dueDate)}</td></tr>`:''}
        ${total?`<tr><td style="font-weight:600">Progress</td><td>${done.length} of ${total} tasks complete (${pct}%)</td></tr>`:''}
        ${p.notes?`<tr><td style="font-weight:600">Notes / Pick Up Point</td><td style="white-space:pre-wrap">${escHtml(p.notes)}</td></tr>`:''}
      </tbody>
    </table>

    <div class="rpg">Open Tasks (${open.length})</div>
    <table class="pt" style="margin-bottom:10px">
      <thead><tr><th style="width:60%">Task</th><th style="width:20%">Due Date</th><th style="width:20%">Completed</th></tr></thead>
      <tbody>${tRows(open, false)}</tbody>
    </table>

    <div class="rpg">Completed Tasks (${done.length})</div>
    <table class="pt">
      <thead><tr><th style="width:60%">Task</th><th style="width:20%">Due Date</th><th style="width:20%">Completed</th></tr></thead>
      <tbody>${tRows(done, true)}</tbody>
    </table>`;

  closeModal('ov-main');
  setTimeout(() => window.print(), 200);
}

// ── Small utility helpers (HTML escaping) ──────────────────────────────────
function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) { return escHtml(s); }

// ── Modal helpers ──────────────────────────────────────────────────────────
function showOverlay(id) { $(id).classList.add('show'); }
function closeModal(id)  { $(id).classList.remove('show'); }
function bgClose(e, id)  { if (e.target === $(id)) closeModal(id); }

// ── Theme (light/dark) controls ────────────────────────────────────────────
function applyTheme(t) {
  if (t === 'dark') {
    document.documentElement.setAttribute('data-theme','dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '🌙' : '☀';
}
function toggleTheme() {
  const cur = localStorage.getItem('rc_theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('rc_theme', next);
  applyTheme(next);
}
// Apply saved preference immediately (before render to avoid flash)
(function(){
  const saved = localStorage.getItem('rc_theme') || 'light';
  applyTheme(saved);
})();

// ── Mobile "More" menu controls ────────────────────────────────────────────
function toggleMoreMenu(e) {
  e && e.stopPropagation();
  const m = $('more-menu');
  if (m) m.classList.toggle('show');
}
function hideMoreMenu() {
  const m = $('more-menu');
  if (m) m.classList.remove('show');
}
// Close the More menu when tapping outside it
document.addEventListener('click', (e) => {
  const m = $('more-menu');
  if (!m) return;
  if (m.classList.contains('show') && !m.contains(e.target)) {
    m.classList.remove('show');
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
load();
// Make sure the My Day tab is highlighted on first load (matches default activeView)
document.querySelectorAll('.vbtn').forEach(b => {
  b.classList.toggle('on', b.dataset.v === activeView);
});
// Make sure ftabs / tbar visibility matches the default view (myday)
// Search is ALWAYS visible; stage/priority filters only on customer-record views.
{
  const showFtabs = activeView === 'cards' || activeView === 'table';
  const showRecordFilters = activeView === 'cards' || activeView === 'kanban' || activeView === 'table';
  if ($('ftabs')) $('ftabs').style.display = showFtabs ? '' : 'none';
  if ($('main-tbar')) $('main-tbar').style.display = '';
  const sf = $('sf'), pf = $('pf'), hc = $('hide-children');
  if (sf) sf.style.display = showRecordFilters ? '' : 'none';
  if (pf) pf.style.display = showRecordFilters ? '' : 'none';
  if (hc) hc.parentElement.style.display = showRecordFilters ? '' : 'none';
  // Set placeholder to match default view
  const srch = $('srch');
  if (srch) {
    const phMap = {
      myday:'Search tasks…', tasks:'Search tasks…', projects:'Search projects…',
      cards:'Search customers & prospects…', kanban:'Search customers & prospects…', table:'Search customers & prospects…'
    };
    srch.placeholder = phMap[activeView] || 'Search…';
  }
}
render();
updateSyncStatus();
// Auto-open the record/project from URL query parameter (if present)
autoOpenFromURL();
// After local render, try to pull latest from Sheets in background
// If the record wasn't found locally, try again after the pull completes
loadFromSheets().then(() => autoOpenFromURL());
// Re-try flush every 30s in case of intermittent connectivity
setInterval(() => { if (syncQueue.length && isOnline) flushQueue(); }, 30000);
</script>
